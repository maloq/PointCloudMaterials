defaults:
  - data: synth_modelnet_objects
  - _self_

project_name: pointnet
experiment_name: POINTGPT_MODELNET40_G${pointgpt.num_group}_S${pointgpt.group_size}_D${pointgpt.encoder_dims}
wandb_mode: online

model_type: pointgpt

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

learning_rate: 0.0001
decay_rate: 0.05

batch_size: 64
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1

epochs: 300
max_samples: 0

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: false
log_every_n_steps: 10
num_workers: 6

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1e-6

enable_swa: false
swa_epoch_start: 1000

warmup_enabled: true
warmup_epochs: 10
warmup_start_factor: 0.1

# Supervised cache + class-accuracy metrics (same pipeline as contrastive module).
max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
val_cluster_acc_methods: [kmeans]
val_cluster_acc_runs: 1
test_cluster_acc_methods: [kmeans, kmeans++]
test_cluster_acc_runs: 1
test_cluster_acc_runs_by_method:
  kmeans: 20

pointgpt:
  num_group: 64
  group_size: 32
  mask_ratio: 0.7
  keep_attend: 10
  encoder_dims: 384
  trans_dim: 384
  depth: 12
  decoder_depth: 4
  num_heads: 6
  deterministic_fps: false
  sorting_mode: nearest
  crop_mode: random
  chamfer_l1_weight: 1.0
  chamfer_l2_weight: 1.0

data:
  modelnet_split: train
  modelnet_eval_split: test
  train_ratio: 0.9
  num_points: 1024
  model_points: 1024
  add_center_point: false
  pre_normalize: true
  normalize: true
  augmentation:
    rotation_scale: 0.0
    noise_scale: 0.0
    jitter_scale: 0.0
    scaling_range: 0.2
    track_augmentation: false
