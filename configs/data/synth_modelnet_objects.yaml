kind: synthetic
dataset_type: modelnet_objects
data_path: datasets/ModelNet40_fast
modelnet_split: train
classes: ["chair", "airplane", "car", "lamp"]
num_points: 256
train_ratio: 0.8
add_center_point: true
pre_normalize: true
normalize: true
fps_cache: true
fps_cache_dir: null
fps_use_gpu: true

augmentation:
  rotation_scale: 1.0
  noise_scale: 0.005
  jitter_scale: 0.0
  scaling_range: 0.1
  track_augmentation: false
