# Larger force-driven aluminium benchmark for the final model study.
# The physics is identical to data_synth_polycrystalline_balanced_geometries.yaml;
# only the periodic system and equilibration lengths are increased.

kind: synthetic
data_path: output/synthetic_data/al_phase_context_large
num_points: 128
model_points: 80
radius: 7.2
sample_type: regular
overlap_fraction: 0.10
n_samples: 0
dataset_max_samples: null
train_ratio: 0.8
drop_edge_samples: true
pre_normalize: true
normalize: true
synthetic:
  root_dir: output/synthetic_data/al_phase_context_large
  classes: [solid_bulk, liquid_bulk, interface]

dataset_name: al_phase_context_mace_mpa_large
random_seed: 24680

potential:
  model_path: datasets/potentials/mace-mpa-0-medium.model
  sha256: 75428afe3a1d7d8062e19bcaabd5c433623cabf308242ec9fb493e38604fb638
  device: cuda
  default_dtype: float32

dynamics:
  pressure_GPa: 0.0
  target_temperature_K: 650.0
  melt_temperature_K: 1600.0
  timestep_fs: 1.0
  thermostat_time_fs: 100.0
  barostat_time_fs: 1000.0
  solid_equilibration_steps: 10000
  melt_steps: 20000
  quench_steps: 10000
  quench_stages: 20
  target_equilibration_steps: 10000
  interface_evolution_steps: 100
  sample_interval: 250

system:
  chemical_symbol: Al
  crystal_structure: fcc
  initial_lattice_constant_A: 4.05
  repetitions: [10, 10, 24]
  liquid_slab_fraction: 0.70
  interface_half_width_A: 5.0

validation:
  maximum_force_eV_per_A: 20.0
  maximum_pressure_error_GPa: 0.15
  maximum_temperature_error_K: 50.0
  minimum_pair_distance_A: 1.8
  reference_density_cache: datasets/dump_first_10.temporal_cache
  maximum_relative_density_error: 0.08
  minimum_solid_fcc_fraction: 0.90
  maximum_liquid_crystalline_fraction: 0.10
  minimum_interface_crystalline_fraction: 0.20
  maximum_interface_crystalline_fraction: 0.80

output:
  root_dir: output/synthetic_data/al_phase_context_large
  overwrite: false
  save_extxyz: true
