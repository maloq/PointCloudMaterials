# Autoencoder
kind: real
radius: 7.6
sample_type: 'regular'
n_samples: 8000000
num_points: 160
model_points: 80
overlap_fraction: 0.4
drop_edge_samples: true
edge_drop_layers: 2
dr: 0.01 # to calculate rdf
auto_cutoff:
  enabled: true
  target_points: 160
  quantile: 0.995
  estimation_samples_per_file: 4000
  seed: 42
  safety_factor: 1.02
  boundary_margin: 7.6
data_path: 'datasets/Ta/inherent_configurations'
data_files:
  - '2.7ns.npy'
  - '2.8ns.npy'
  - '2.9ns.npy'
  - '3.0ns.npy'
  - '3.60ns.npy'
