# =============================================================================
# POLYCRYSTALLINE METAL: Multiple Grains with Defects and Perturbations
# =============================================================================
# This configuration simulates a fully crystallized monocrystall metal 
# =============================================================================
kind: synthetic
data_path: output/synthetic_data/monocrystall_metal
num_points: 120
model_points: 80
radius: 7.5
sample_type: regular
overlap_fraction: 0.0
n_samples: 0
train_ratio: 0.8
drop_edge_samples: true
pre_normalize: true
normalize: true
normalization_scale: 1.732

global:
  L: 300.0
  
  # Target density (atoms/Å³) - solid iron at room temperature
  rho_target: 0.0849
  
  # Average nearest-neighbor distance (Å) - BCC iron
  avg_nn_dist: 2.49
  
  # Many grains for realistic polycrystalline structure
  grain_count: 1
  
  # Grain boundary thickness
  # Creates intermediate layers between misoriented grains
  intermediate_layer_thickness_factor: 2.0
  
  random_seed: 12345
  
  output_dir: "output/monocrystall_metal"
  
  parallel:
    enabled: true
    n_workers: null
    chunk_size: 2  # Process 2 grains per task
  
  cell_size_factor: 1.5

# =============================================================================
# PHASE DEFINITIONS
# =============================================================================

phases:
  # ---------------------------------------------------------------------------
  # PRIMARY PHASE: BCC Iron (α-Fe, stable at room temperature)
  # ---------------------------------------------------------------------------
  bcc_iron_pristine:
    phase_type: crystal_bcc
    
    structural_params:
      density_target: 0.0849
    
    perturbations:
      # Room temperature thermal vibrations
      temperature_K: 300.0
      atomic_mass_amu: 55.845
      
      # Low vacancy concentration (equilibrium at 300K)
      p_dropout: 0.001
      dropout_relax_radius: 6.0
      dropout_relax_max_fraction: 0.05
      use_elastic_relaxation: true
      
      # Rare rotation defects
      rot_bubble_prob: 0.1
      rot_bubble_radius: 4.0
      rot_bubble_angle_deg: 3.0
      
      # No density bubbles in pristine grains
      density_bubbles: []

  # ---------------------------------------------------------------------------
  # DEFECTED BCC: Grains with higher defect density
  # ---------------------------------------------------------------------------
  bcc_iron_defected:
    phase_type: crystal_bcc
    
    structural_params:
      density_target: 0.0845  # Slightly lower due to defects
    
    perturbations:
      # Slightly elevated temperature (local heating from deformation)
      temperature_K: 350.0
      atomic_mass_amu: 55.845
      
      # Higher vacancy concentration (cold-worked metal)
      p_dropout: 0.008
      dropout_relax_radius: 7.0
      dropout_relax_max_fraction: 0.12
      use_elastic_relaxation: true
      
      # More rotation defects (dislocation tangles)
      rot_bubble_prob: 0.5
      rot_bubble_radius: 8.0
      rot_bubble_angle_deg: 15.0
      
      # Vacancy clusters and interstitial clusters
      density_bubbles:
        - expected_count: 2
          radius: 5.0
          alpha: -0.4  # Vacancy clusters (voids)
        - expected_count: 1
          radius: 4.0
          alpha: 0.3   # Interstitial clusters

  # ---------------------------------------------------------------------------
  # HEAVILY DEFORMED: Severe plastic deformation regions
  # ---------------------------------------------------------------------------
  bcc_iron_deformed:
    phase_type: crystal_bcc
    
    structural_params:
      density_target: 0.0840
    
    perturbations:
      temperature_K: 400.0  # Adiabatic heating from deformation
      atomic_mass_amu: 55.845
      
      # High vacancy supersaturation
      p_dropout: 0.015
      dropout_relax_radius: 8.0
      dropout_relax_max_fraction: 0.15
      use_elastic_relaxation: true
      
      # Many rotation defects (high dislocation density)
      rot_bubble_prob: 0.8
      rot_bubble_radius: 10.0
      rot_bubble_angle_deg: 25.0
      
      # Multiple defect clusters
      density_bubbles:
        - expected_count: 4
          radius: 6.0
          alpha: -0.5  # Larger voids
        - expected_count: 3
          radius: 4.0
          alpha: -0.3
        - expected_count: 2
          radius: 5.0
          alpha: 0.4   # Interstitial loops

  # ---------------------------------------------------------------------------
  # FCC INCLUSIONS: Retained austenite (γ-Fe)
  # ---------------------------------------------------------------------------
  fcc_iron_austenite:
    phase_type: crystal_fcc
    
    structural_params:
      # FCC iron has different density
      density_target: 0.0830
    
    perturbations:
      temperature_K: 300.0
      atomic_mass_amu: 55.845
      
      # Interface defects with BCC matrix
      p_dropout: 0.005
      dropout_relax_radius: 5.0
      dropout_relax_max_fraction: 0.08
      use_elastic_relaxation: true
      
      # Twin boundaries common in FCC
      rot_bubble_prob: 0.4
      rot_bubble_radius: 12.0
      rot_bubble_angle_deg: 60.0  # Twin angle for FCC
      
      density_bubbles: []

  # ---------------------------------------------------------------------------
  # AMORPHOUS REGIONS: Grain boundary "phase" (disordered)
  # ---------------------------------------------------------------------------
  grain_boundary_amorphous:
    phase_type: amorphous_random
    
    structural_params:
      min_pair_dist: 2.1
      density_target: 0.078  # GB is less dense
    
    liquid_structure:
      method: simple  # Fast generation for thin GB regions
      target_coordination: 10.0  # Lower coordination at GB
    
    perturbations:
      # Higher disorder at grain boundaries
      sigma_thermal: 0.25
      temperature_K: 0.0  # Use sigma_thermal directly
      
      # Free volume at grain boundaries
      p_dropout: 0.03
      dropout_relax_radius: 4.0
      dropout_relax_max_fraction: 0.1
      use_elastic_relaxation: false  # Linear for amorphous
      
      rot_bubble_prob: 0.0
      
      density_bubbles:
        - expected_count: 1
          radius: 3.0
          alpha: -0.2  # GB free volume

# =============================================================================
# GRAIN ASSIGNMENT
# =============================================================================
# Realistic distribution for cold-worked polycrystalline steel

grain_assignment:
  probabilities:
    bcc_iron_pristine: 1.0  
