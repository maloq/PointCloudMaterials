# Direct-coexistence phase transformations from the prepared 70,304-atom
# solid-liquid interface. Both branches start from the exact same atomic frame.

dataset_name: al_direct_coexistence_mace_mpa_70304
source_generator_config: configs/data/atomistic_al_phase_context.yaml
source_dataset: output/synthetic_data/al_phase_context_70304x1
source_interface_environment: replica_000_solid_liquid_interface
source_solid_environment: replica_000_bulk_solid
source_frame_step: 0
random_seed: 24680
# 5,000 / 50 + 1 = 101 full atomic frames per transition branch.
sample_interval: 50

analysis:
  # One bin per conventional FCC repeat along z (about 4 A); finer bins can lie
  # entirely between crystal planes and do not define a local phase fraction.
  profile_bins: 26
  # Resolve the first several Al coordination shells for every saved frame.
  rdf_cutoff_A: 8.0
  rdf_bins: 160

crystallization:
  # Strong undercooling drives the two planar fronts into the prepared liquid slab.
  temperature_K: 650.0
  steps: 5000
  minimum_crystalline_fraction_change: 0.03

melting:
  # Above the experimental Al melting point and deliberately separated from the
  # unknown MACE-MPA coexistence temperature so the direction is unambiguous.
  temperature_K: 1100.0
  steps: 5000
  minimum_crystalline_fraction_change: 0.05

output:
  root_dir: output/synthetic_data/al_direct_coexistence_70304
  overwrite: false
  save_extxyz: true
  create_visualizations: true
