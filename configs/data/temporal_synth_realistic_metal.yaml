dataset_name: temporal_synth_realistic_metal
seed: 260625

domain:
  box_size: 70.0
  avg_nn_distance: 2.86
  neighborhood_radius: 12.0
  atoms_per_site: 96
  site_count: 96
  layout: random
  padding: 8.0
  random_min_site_distance: 9.0

time:
  num_frames: 48
  delta_t: 1.0

states:
  - name: L
    template_kind: liquid
    template_params:
      min_pair_distance: 2.10
      liquid_method: mro_clustered
      target_coordination: 11.4
      first_peak_position: 2.86
      first_peak_height: 2.65
      second_peak_position: 4.66
      mro_cluster_fraction: 0.42
      mro_cluster_radius: 7.2
      mro_radial_jitter: 0.16
      mro_tetra_fraction: 0.44
    base_thermal_jitter: 0.22
    base_defect_amplitude: 0.10
    base_strain_scale: 0.020
    metastable: true
    grain_bearing: false
    dwell:
      distribution: uniform
      min_steps: 3
      max_steps: 8

  - name: P
    template_kind: precursor
    crystal_structure: fcc
    template_params:
      min_pair_distance: 2.10
      liquid_method: mro_clustered
      target_coordination: 11.8
      ordered_fraction: 0.48
      embedded_probability: 0.18
      embedded_radius: 5.1
      mro_cluster_fraction: 0.34
      mro_cluster_radius: 6.3
      mro_radial_jitter: 0.13
      mro_tetra_fraction: 0.30
    base_thermal_jitter: 0.15
    base_defect_amplitude: 0.14
    base_strain_scale: 0.016
    metastable: true
    grain_bearing: true
    dwell:
      distribution: uniform
      min_steps: 2
      max_steps: 6

  - name: I
    template_kind: interface
    crystal_structure: fcc
    template_params:
      min_pair_distance: 2.05
      liquid_method: mro_clustered
      target_coordination: 11.8
      interface_width: 5.2
      solid_fraction_start: 0.16
      solid_fraction_end: 0.88
      plane_jitter: 0.85
      mro_cluster_fraction: 0.26
      mro_cluster_radius: 5.8
      mro_radial_jitter: 0.12
      mro_tetra_fraction: 0.22
    base_thermal_jitter: 0.12
    base_defect_amplitude: 0.18
    base_strain_scale: 0.014
    metastable: false
    grain_bearing: true
    dwell:
      distribution: uniform
      min_steps: 1
      max_steps: 4

  - name: D
    template_kind: defective_crystal
    crystal_structure: fcc
    base_thermal_jitter: 0.075
    base_defect_amplitude: 0.32
    base_strain_scale: 0.018
    metastable: true
    grain_bearing: true
    dwell:
      distribution: uniform
      min_steps: 2
      max_steps: 7

  - name: C
    template_kind: crystal
    crystal_structure: fcc
    base_thermal_jitter: 0.045
    base_defect_amplitude: 0.035
    base_strain_scale: 0.006
    metastable: true
    grain_bearing: true
    dwell:
      distribution: uniform
      min_steps: 4
      max_steps: 12

  - name: G
    template_kind: grain_boundary
    crystal_structure: fcc
    template_params:
      boundary_width: 4.0
      plane_jitter: 0.65
    base_thermal_jitter: 0.080
    base_defect_amplitude: 0.24
    base_strain_scale: 0.014
    metastable: true
    grain_bearing: true
    dwell:
      distribution: uniform
      min_steps: 3
      max_steps: 8

transition_graph:
  initial_state_probs:
    L: 0.84
    P: 0.14
    I: 0.02
  primary_path: [L, P, I, D, C]
  transitions:
    - source: L
      target: P
      weight: 1.0
    - source: P
      target: L
      weight: 1.0
    - source: P
      target: I
      weight: 1.0
    - source: I
      target: C
      weight: 1.0
    - source: I
      target: D
      weight: 0.85
    - source: I
      target: G
      weight: 0.45
    - source: I
      target: P
      weight: 1.0
    - source: I
      target: L
      weight: 1.0
    - source: D
      target: C
      weight: 1.0
    - source: C
      target: I
      weight: 1.0
    - source: C
      target: D
      weight: 0.55
    - source: G
      target: C
      weight: 0.85

dynamics:
  mode: coupled
  neighbor_count: 14
  coupling_strength: 2.6
  reverse_coupling_strength: 0.22
  nucleation_seed_fraction: 0.015
  nucleation_state: I
  nucleation_start_frame: 3
  nucleation_blob_hops: 2
  metastable_min_dwell: 3
  boundary_state_name: G
  boundary_min_distinct_grains: 4
  boundary_state_probability: 0.10
  crystal_variant_probability: 0.035
  crystal_variant_persistence: 0.990
  liquid_to_precursor_front_threshold: 1
  liquid_to_precursor_front_probability: 0.92
  precursor_to_interface_blob_threshold: 2
  precursor_to_interface_blob_probability: 0.82
  interface_to_crystal_blob_threshold: 4
  interface_to_crystal_blob_probability: 0.88

nuisance:
  orientation_drift_deg: 2.2
  orientation_alignment: 0.94
  strain_relaxation: 0.90
  strain_drift_scale: 0.006
  thermal_relaxation: 0.84
  thermal_noise_scale: 0.018
  transition_thermal_spike: 0.035
  defect_relaxation: 0.86
  defect_noise_scale: 0.025

rendering:
  frame_style: dense_persistent_box
  target_density: 0.0603
  default_crystal_structure: fcc
  save_frame_dirs: true
  save_atom_tables: true
  neighborhood_sampling_method: closest_to_center
  parallel_workers: 16
  site_assignment_candidate_count: 24
  phase_region_radius_nn: 1.0
  phase_region_target_atoms: 10
  phase_field_jitter_fraction: 0.18
  fast_mode: false

trajectories:
  center_neighborhoods: true
  save_combined_npz: true

output:
  output_dir: output/synthetic_data/temporal_synth_realistic_metal
  overwrite: true
  compress: true
  frame_storage: single_chunk_npz

visualization:
  enabled: true
  output_subdir: visualizations
  max_frames_to_plot: 6
  max_sites_in_gallery: 8
  max_atoms_per_frame: 9000
  frame_slice_axis: 2
  frame_slice_relative_thickness: 0.22
  write_interactive_html: true
  write_animations: true
  animation_max_atoms_per_frame: 12000
  animation_diagonal_cut_fraction: 0.85
  animation_diagonal_visible_depth_nn: 3.0
  animation_diagonal_marker_size: 18.0
  animation_full_box_marker_size: 2.6
  parallel_workers: 8
