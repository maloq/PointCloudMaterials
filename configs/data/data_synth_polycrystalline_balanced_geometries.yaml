# Force-driven aluminium phase-context benchmark.
#
# This file serves both Hydra training and the atomistic generation CLI:
#   conda run -n pointnet python -m src.data_utils.synthetic.atomistic_generator \
#     --config configs/data/data_synth_polycrystalline_balanced_geometries.yaml

kind: synthetic
data_path: output/synthetic_data/al_phase_context
num_points: 128
model_points: 80
radius: 7.2
sample_type: regular
overlap_fraction: 0.10
n_samples: 0
dataset_max_samples: null
train_ratio: 0.8
drop_edge_samples: true
pre_normalize: true
normalize: true
synthetic:
  root_dir: output/synthetic_data/al_phase_context
  classes: [solid_bulk, liquid_bulk, interface]

dataset_name: al_phase_context_mace_mpa
random_seed: 12345

potential:
  # The generator refuses URLs and never downloads a model implicitly.
  model_path: datasets/potentials/mace-mpa-0-medium.model
  sha256: 75428afe3a1d7d8062e19bcaabd5c433623cabf308242ec9fb493e38604fb638
  device: cuda
  default_dtype: float32

dynamics:
  pressure_GPa: 0.0
  target_temperature_K: 650.0
  melt_temperature_K: 1600.0
  timestep_fs: 1.0
  thermostat_time_fs: 100.0
  barostat_time_fs: 1000.0
  solid_equilibration_steps: 2000
  melt_steps: 5000
  quench_steps: 2000
  quench_stages: 10
  target_equilibration_steps: 2000
  interface_evolution_steps: 50
  sample_interval: 100

system:
  chemical_symbol: Al
  crystal_structure: fcc
  initial_lattice_constant_A: 4.05
  repetitions: [6, 6, 16]
  liquid_slab_fraction: 0.70
  interface_half_width_A: 5.0

validation:
  maximum_force_eV_per_A: 20.0
  maximum_pressure_error_GPa: 0.50
  maximum_temperature_error_K: 75.0
  minimum_pair_distance_A: 1.8
  reference_density_cache: datasets/dump_first_10.temporal_cache
  maximum_relative_density_error: 0.10
  minimum_solid_fcc_fraction: 0.85
  maximum_liquid_crystalline_fraction: 0.15
  minimum_interface_crystalline_fraction: 0.20
  maximum_interface_crystalline_fraction: 0.80

output:
  root_dir: output/synthetic_data/al_phase_context
  overwrite: false
  save_extxyz: true
