# Autoencoder
kind: real
radius: 7.6
sample_type: 'regular'
n_samples: 8000000
num_points: 160
model_points: 80
overlap_fraction: 0.5
drop_edge_samples: true
edge_drop_layers: 2
dr: 0.01 # to calculate rdf
auto_cutoff:
  enabled: true
  target_points: 160
  quantile: 0.995
  estimation_samples_per_file: 4000
  seed: 42
  safety_factor: 1.02
  boundary_margin: 7.6
data_path: 'datasets/Al/inherent_configurations_off'
data_files:
  - '166ps.npy'
  - '170ps.npy'
  - '174ps.npy'
  - '175ps.npy'
  - '177ps.npy'
  - '240ps.npy'
