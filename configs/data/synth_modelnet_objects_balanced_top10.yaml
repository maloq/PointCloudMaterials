kind: synthetic
dataset_type: modelnet_objects_balanced_topk
data_path: datasets/ModelNet40_fast

# Keep only the top-K most frequent classes from the ranking split.
top_k_classes: 10
class_selection_split: train

# Train split is balanced; eval split keeps natural class frequencies.
balance_mode: downsample
balance_seed: 42
modelnet_eval_split: test

# Optional explicit class list override. Keep null to auto-pick top-K.
classes: null
strict_classes: false

num_points: 1024
model_points: 800
add_center_point: true
pre_normalize: true
normalize: true
fps_cache: true
fps_cache_dir: null
fps_use_gpu: true
fps_ordered: true

augmentation:
  rotation_scale: 1.0
  noise_scale: 0.01
  jitter_scale: 0.0
  scaling_range: 0.2
  track_augmentation: false
