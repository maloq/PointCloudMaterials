kind: synthetic
data_path: output/synthetic_data/small_crystals
num_points: 80
radius: 4.5
sample_type: regular
overlap_fraction: 0.5
n_samples: 0
train_ratio: 0.8
drop_edge_samples: true
pre_normalize: true
normalize: true

synthetic:
  data_dir: output/synthetic_data/small_crystals
global:
  L: 90.0                    # Cube side length matching previous target count at rho_target
  rho_target: 0.25                     # Maintain identical global density
  avg_nn_dist: 1.0                     # Use same nearest-neighbor distance scaling
  grain_count: 8                       # Keep grain tessellation identical
  intermediate_layer_thickness_factor: 5.0  # Preserve interface thickness for comparability
  random_seed: 42                      # Match random seed for structural reproducibility
  output_dir: output/synthetic_data/small_crystals  # Output directory for perturbation-free variant

phases:
  crystal_fcc:
    phase_type: crystal_fcc            # FCC crystal phase
    structural_params: {}              # No additional structural overrides required
    perturbations:
      sigma_thermal: 0.0               # Disable thermal jitter
      p_dropout: 0.0                   # Disable vacancy creation
      dropout_relax_radius: 0.0        # No relaxation since no dropouts
      dropout_relax_max_fraction: 0.0  # No relaxation displacement
      rot_bubble_prob: 0.0             # Disable rotation bubbles
      rot_bubble_radius: 0.0           # Unused with zero probability
      rot_bubble_angle_deg: 0.0        # Unused angle value
      density_bubbles: []              # No density perturbations

  crystal_bcc:
    phase_type: crystal_bcc            # BCC crystal phase
    structural_params: {}              # Defaults suffice
    perturbations:
      sigma_thermal: 0.002
      p_dropout: 0.00
      dropout_relax_radius: 1.5
      dropout_relax_max_fraction: 0.35
      rot_bubble_prob: 0.0
      rot_bubble_radius: 0.0
      rot_bubble_angle_deg: 0.0
      density_bubbles: []

  amorphous_repeat:
    phase_type: amorphous_repeat       # Repeating amorphous pseudo-cell phase
    structural_params:
      cell_size: 2.4                   # Reuse baseline cell definition
      motif_point_count: 18            # Same motif size as baseline
      min_pair_dist: 0.8               # Minimum spacing for motif generation
    perturbations:
      sigma_thermal: 0.0
      p_dropout: 0.0
      dropout_relax_radius: 0.0
      dropout_relax_max_fraction: 0.0
      rot_bubble_prob: 0.0
      rot_bubble_radius: 0.0
      rot_bubble_angle_deg: 0.0
      density_bubbles: []

  amorphous_random:
    phase_type: amorphous_random       # Non-repeating amorphous phase
    structural_params:
      min_pair_dist: 0.85              # Same packing spacing as baseline
    perturbations:
      sigma_thermal: 0.0
      p_dropout: 0.0
      dropout_relax_radius: 0.0
      dropout_relax_max_fraction: 0.0
      rot_bubble_prob: 0.0
      rot_bubble_radius: 0.0
      rot_bubble_angle_deg: 0.0
      density_bubbles: []

  amorphous_mixed:
    phase_type: amorphous_mixed        # Amorphous phase with optional crystal seeds
    structural_params:
      min_pair_dist: 0.8               # Base amorphous spacing
      embedded_crystal: crystal_fcc    # Embedded crystal template
      embedded_probability: 0.4        # Keep inclusion probability for structural comparability
      embedded_radius: 2.2             # Inclusion radius unchanged
    perturbations:
      sigma_thermal: 0.0
      p_dropout: 0.0
      dropout_relax_radius: 0.0
      dropout_relax_max_fraction: 0.0
      rot_bubble_prob: 0.0
      rot_bubble_radius: 0.0
      rot_bubble_angle_deg: 0.0
      density_bubbles: []

grain_assignment:
  explicit:
    - crystal_fcc                      # Grain 0
    - crystal_bcc                      # Grain 1
    - crystal_bcc                  # Grain 2
    - crystal_fcc                 # Grain 3
    - crystal_fcc                      # Grain 4
    - crystal_bcc                  # Grain 5
    - crystal_bcc                      # Grain 6
    - crystal_bcc                 # Grain 7
