global:
  L: 1200.0
  rho_target: 0.02
  avg_nn_dist: 2.0
  grain_count: 5
  objects_per_grain: 400
  points_per_object: 256
  collision_safety_factor: 3.0
  output_dir: output/simple_dataset
  random_seed: 42

phases:
  my_cubes:
    phase_type: box
    structural_params:
      noise_sigma: 0.1
      
  my_spheres:
    phase_type: sphere
    structural_params:
      noise_sigma: 0.0
      
  my_clouds:
    phase_type: ellipsoid
    structural_params:
      noise_sigma: 0.5
      
  my_cylinders:
    phase_type: cylinder
    structural_params:
      noise_sigma: 0.2
      
  my_donuts:
    phase_type: torus
    structural_params:
      noise_sigma: 0.0

grain_assignment:
  probabilities:
    my_cubes: 0.2
    my_spheres: 0.2
    my_clouds: 0.2
    my_cylinders: 0.2
    my_donuts: 0.2
