defaults:
  - data: data_synth_polycrystalline_balanced_geometries
  - _self_

project_name: pointnet
experiment_name: POINTGPT_MOLECULAR_G${pointgpt.num_group}_S${pointgpt.group_size}_D${pointgpt.encoder_dims}_N${data.num_points}_M${data.model_points}
wandb_mode: online

model_type: pointgpt

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

learning_rate: 0.001
decay_rate: 0.02

batch_size: 128
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 2

epochs: 120
max_samples: 0

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: false
log_every_n_steps: 5
num_workers: 4

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1e-6

enable_swa: false
swa_epoch_start: 1000

warmup_enabled: true
warmup_epochs: 10
warmup_start_factor: 0.1

# Supervised cache settings (metrics requiring class labels are skipped if labels are unavailable).
max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false

pointgpt:
  # Tuned for molecular crops (80 points per sample).
  num_group: 24
  group_size: 12
  mask_ratio: 0.6
  keep_attend: 4
  encoder_dims: 384
  trans_dim: 384
  depth: 8
  decoder_depth: 3
  num_heads: 6
  deterministic_fps: false
  sorting_mode: nearest
  crop_mode: random
  chamfer_l1_weight: 1.0
  chamfer_l2_weight: 1.0

# Keep dataset defaults from data_ae_Al_80; explicit fields below are for readability.
data:
  num_points: 128
  model_points: 80
  pre_normalize: true
  normalize: true
