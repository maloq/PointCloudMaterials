defaults:
 - data: data_synth_polycrystalline_balanced_geometries_v2
 - _self_
# - data: data_ae_Al_80
project_name: pointnet
experiment_name: BT_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: barlow_twins  # Self-supervised Barlow Twins
latent_size: 512  # Number of equivariant channels for latent vectors

# Optional: Load pretrained supervised encoder
load_supervised_checkpoint: False
# Full-state training resume (restores epoch/optimizer/scheduler state).
resume_from_checkpoint: null  # e.g. output/2026-02-07/20-43-14/your_model.ckpt
# Weights-only initialization (starts a fresh run from loaded model params).
init_from_checkpoint: null
# If true, require exact state-dict key match when loading init weights.
init_from_checkpoint_strict: false

# data:
#   synthetic:
#     classes: ['bcc_iron_pristine', 'fcc_iron_austenite' , 'bcc_iron_defected',]

# NequIP-style encoder - produces equivariant latent (B, latent_size, 3)
# and invariant latent (B, latent_size)
# encoder:
#   name: NequIP_Backbone
#   kwargs:
#     latent_size: ${latent_size}
#     scalar_dim: 256
#     vector_dim: 192
#     num_layers: 4
#     num_neighbors: 32
#     radial_basis: 16
#     cutoff: 2.0
#     hidden_dim: 256
#     pooling: mean
#     dropout_rate: 0.0


encoder:
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 384
    trans_dim: 256
    depth: 8
    predictor_depth: 2
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: nearest
    center_input: true


# Decoder config is required by the model factory but is not used for Barlow Twins
decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}

# Training parameters
learning_rate: 0.003
batch_size: 512
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: False
swa_epoch_start: 1000
epochs: 120
max_samples: 0

gpu: True
devices: [0, 1]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 4
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6

decay_rate: 0.0004
enable_embedding_metrics: false
enable_svm_accuracy: false

# IDEC clustering (disabled by default; enable after pretraining)
idec_enabled: False
idec_num_clusters: 0
idec_gamma: 0.1
idec_update_interval: 200
idec_delta: 0.001
idec_max_iter: null
idec_use_global_p: True
idec_normalize_z: True
idec_init_kmeans: True

# Barlow Twins (self-supervised)
barlow_enabled: True
barlow_weight: 1.0
barlow_lambda: 0.005
barlow_embed_dim: 120
barlow_start_epoch: 0
barlow_jitter_std: 0.01
barlow_jitter_mode: physical
barlow_drop_ratio: 0.0
barlow_neighbor_view: true
barlow_neighbor_view_mode: second
barlow_neighbor_k: 6
barlow_view_points: ${data.model_points}
barlow_rotation_mode: none
barlow_rotation_deg: 0.0
barlow_strain_std: 0.02
barlow_strain_volume_preserve: true
barlow_occlusion_mode: mixed
barlow_occlusion_view: second
barlow_occlusion_slab_frac: 0.0
barlow_occlusion_cone_deg: 0.0
# Data augmentation (applied in dataloaders)
augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false

vicreg_enabled: False

# Post-training clustering analysis
