defaults:
  - _self_

project_name: pointnet
experiment_name: LINE_JEPA_VICREG_STATIC_MULTI_l${latent_size}_L${data.line_atoms}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: line_jepa
latent_size: 512

resume_from_checkpoint: null
init_from_checkpoint: output/2026-06-16/18-46-58/VICREG_l512_N160_M80_RI_MAE_Invariant-epoch=789.ckpt
init_from_checkpoint_strict: false
init_from_checkpoint_encoder_only: false
run_post_training_analysis: false
run_test_after_training: true

data:
  kind: line_static
  radius: 7.2
  sample_type: regular
  n_samples: 8000000
  num_points: 160
  model_points: 80
  overlap_fraction: 0.3
  drop_edge_samples: true
  edge_drop_layers: 2
  dr: 0.01
  train_ratio: 0.8
  line_samples_per_file: 100000
  line_atoms: 7
  line_candidate_atoms: 512
  line_seed: 0
  center_neighborhoods: true
  line_selection_method: closest
  normalize: true
  auto_cutoff:
    enabled: true
    target_points: 160
    quantile: 0.995
    estimation_samples_per_file: 4000
    seed: 42
    safety_factor: 1.02
    boundary_margin: 7.2
  data_sources:
    - data_path: datasets/Al/inherent_configurations_off
      data_files:
        - 166ps.npy
        - 170ps.npy
        - 174ps.npy
        - 175ps.npy
        - 177ps.npy
        - 240ps.npy
    - data_path: datasets/Mg/inherent_configurations
      data_files:
        - 940ps.npy
        - 960ps.npy
        - 980ps.npy
        - 990ps.npy
        - 1000ps.npy
        - 1500ps.npy
    - data_path: datasets/Ta/inherent_configurations
      data_files:
        - 2.7ns.npy
        - 2.8ns.npy
        - 2.9ns.npy
        - 3.0ns.npy
        - 3.60ns.npy
    - data_path: datasets/Zr/inherent_configurations
      data_files:
        - 160ps.npy
        - 200ps.npy
        - 240ps.npy
        - 280ps.npy
        - 310ps.npy
        - 1560ps.npy
    - data_path: datasets/Al50Ni50/inherent_configurations
      data_files:
        - 0.3ns.npy
        - 0.5ns.npy
        - 0.7ns.npy
        - 0.9ns.npy
        - 2ns.npy
        - 5ns.npy

encoder:
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 384
    trans_dim: 256
    depth: 8
    predictor_depth: 4
    num_heads: 16
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: none
    group_sampling: random
    center_input: true
    use_gradient_checkpointing: false

line_jepa_weight: 0.2
line_jepa_prediction_coeff: 1.0
line_jepa_sigreg_coeff: 0.02
line_jepa_target_ema_decay: 0.999
line_jepa_start_epoch: 5
line_jepa_prediction_loss: smooth_l1
line_jepa_sigreg_num_slices: 256
line_jepa_sigreg_integration_min: -5.0
line_jepa_sigreg_integration_max: 5.0
line_jepa_sigreg_integration_points: 17
line_jepa_predictor_hidden_dim: ${latent_size}
line_jepa_predictor_depth: 3
line_jepa_predictor_heads: 8
line_jepa_predictor_mlp_ratio: 4.0
line_jepa_predictor_dropout: 0.0

vicreg_enabled: true
vicreg_weight: 1.0
vicreg_objective: vicreg
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 25.0
vicreg_cov_coeff: 1.0
vicreg_embed_dim: 120
vicreg_start_epoch: 0
vicreg_jitter_std: 0.01
vicreg_jitter_mode: physical
vicreg_drop_ratio: 0.0
vicreg_neighbor_view: true
vicreg_neighbor_view_mode: second
vicreg_neighbor_k: 8
vicreg_neighbor_max_relative_distance: 0.0
vicreg_view_points: ${data.model_points}
vicreg_rotation_mode: none
vicreg_rotation_deg: 10.0
vicreg_strain_std: 0.0
vicreg_strain_volume_preserve: true
vicreg_occlusion_mode: mixed
vicreg_occlusion_view: second
vicreg_occlusion_slab_frac: 0.0
vicreg_occlusion_cone_deg: 0.0
vicreg_occlusion_prob: 1.0
vicreg_std_eps: 0.0001
vicreg_std_target: 1.0
vicreg_radial_enabled: false
vicreg_radial_beta1: 1.0
vicreg_radial_beta2: 0.1
vicreg_radial_m: null
vicreg_radial_eps: 1.0e-08
vicreg_projector_bn_eval_batch_stats: false

swav_enabled: false
swav_weight: 0.0

learning_rate: 0.0003
batch_size: 512
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 80
max_samples: 0
check_val_every_n_epoch: 2
checkpoint_monitor: val/loss
checkpoint_mode: min
checkpoint_save_top_k: 3

gpu: true
devices: [0]
ddp_find_unused_parameters: false
log_every_n_steps: 10
num_workers: 12
line_prefetch_factor: 4
test_single_device: true

compile_encoder: true
encoder_compile_mode: reduce-overhead
encoder_compile_fullgraph: false
encoder_compile_dynamic: false
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1.0e-06
warmup_enabled: true
warmup_epochs: 5
warmup_start_factor: 0.1

decay_rate: 0.0003
enable_embedding_metrics: false
enable_svm_accuracy: false
cache_train_supervised_metrics: false
max_consecutive_nan_steps: 20
nonfinite_check_stride: 8

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false

num_sanity_val_steps: 0
