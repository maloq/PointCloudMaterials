defaults:
  - data: data_ae_Al_80
project_name: pointnet
experiment_name: SPD_${decoder.name}_l${latent_size}_P${data.num_points}_${loss}_${batch_size}
wandb_mode: online
experiment_tags:
  - SWA
  - Folding
  - centered
  - RotationConsistency
  - no_edges

latent_size: 64
encoder: 
  name: PnE_L
  kwargs:
    latent_size: ${latent_size}
    dropout_rate: 0.2
    feature_transform: False
decoder: 
  name: FoldingSphereAttn
  kwargs: 
    latent_size: ${latent_size}
    num_points: ${data.num_points}
    dropout_rate: 0.1
    n_shells: 2
    R1: 0.5
    R2: 1.0
    hidden_dim: 384

max_samples: 0

loss: Sinkhorn
torch_compile: True

learning_rate: 0.005
batch_size: 1024

enable_swa: False
swa_epoch_start: 1000 
epochs: 1000

gpu: True
devices: 0
log_every_n_steps: 5
num_workers: 4
scheduler_gamma: 0.5
scheduler_name: OneCycle

decay_rate: 0.003
kl_latent_loss_scale: 0.02
