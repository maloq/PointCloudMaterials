defaults:
  - vicreg_vn_molecular
  - _self_

model_type: vicreg_masked_latent
training_method: vicreg_masked_latent
experiment_name: VICREG_MASKLAT_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}

# The masked-latent branch uses encoder token methods in addition to forward().
# Keep this off until that path is explicitly compiled and benchmarked.
compile_encoder: false

# Non-overlapping masked-token experiment:
# 10 * 8 consumes the full 80-point model patch exactly, so masked tokens
# cannot share raw atoms with visible tokens.
encoder:
  kwargs:
    num_group: 10
    group_size: 8
    group_sampling: fps
    grouping_mode: partition

# VICReg + masked latent prediction:
# L = L_VICReg-global + lambda_mask * L_masked_latent
#     + lambda_local * L_local_affinity.
masked_latent_enabled: true
masked_latent_weight: 1.0
local_affinity_weight: 0.1

masked_latent_mask_ratio: ${encoder.kwargs.mask_ratio}
masked_latent_target_mode: ema  # ema | stop_gradient
masked_latent_ema_decay: ${encoder.kwargs.ema_decay}
masked_latent_start_epoch: 0

masked_latent_predictor_depth: ${encoder.kwargs.predictor_depth}
masked_latent_predictor_num_heads: ${encoder.kwargs.num_heads}
masked_latent_predictor_mlp_ratio: ${encoder.kwargs.mlp_ratio}
masked_latent_predictor_dropout: ${encoder.kwargs.dropout}

local_affinity_k: 6
local_affinity_temperature: 1.0
