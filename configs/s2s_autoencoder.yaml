defaults:
  - data: autoencoder_Al_basic 
project_name: pointnet
experiment_name: s2s_ResNet_KLRDF_64_latent_256
wandb_mode: offline
experiment_tags:
  - autoencoder
  - S2S
  - ResNet
  - SWA
  - centered

latent_size: 256
type: ResNetSequenceAutoencoderWithRefinement
torch_compile: True
num_refinement_steps: 2

learning_rate: 0.005
batch_size: 16000  
epochs: 500
decay_rate: 0.003
gpu: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: chained

feature_transform_loss_scale: 0.001
reconstruction_loss_scale: 0.5