defaults:
  - data: data_synth_polycrystalline_balanced_geometries_v2
  - _self_

data:
  analysis_data_files: ['175ps.npy']
  analysis_data_file: null
  analysis_single_timestep: false

project_name: pointnet
experiment_name: POINTCONTRAST_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: pointcontrast
latent_size: 80

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

# encoder:
#   name: VN_REVNET_Backbone
#   kwargs:
#     latent_size: ${latent_size}
#     sa_npoints: [80, 40]
#     sa_channels: [128, 256]
#     attn_hidden: 256

encoder:
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 384
    trans_dim: 384
    depth: 8
    predictor_depth: 2
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: nearest
    center_input: true
    
decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}

learning_rate: 0.003
decay_rate: 0.0004

batch_size: 256
precision: 32-true
gradient_clip_val: 1.0
accumulate_grad_batches: 6
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 120
max_samples: 0

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: true
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
warmup_enabled: true
warmup_epochs: 12
warmup_start_factor: 0.1

contrastive_norms_only_latent: false
enable_embedding_metrics: false

max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
disable_dataset_augmentation_for_ssl: true

barlow_enabled: false
barlow_weight: 0.0
vicreg_enabled: false

pointcontrast_enabled: true
pointcontrast_weight: 1.0
pointcontrast_temperature: 0.10
pointcontrast_embed_dim: 120
pointcontrast_start_epoch: 0
pointcontrast_queue_size: 0
pointcontrast_symmetric: true
pointcontrast_normalize_embeddings: true
pointcontrast_jitter_std: 0.01
pointcontrast_jitter_mode: physical
pointcontrast_drop_ratio: 0.0
pointcontrast_drop_apply_to_both: true
pointcontrast_neighbor_view: true
pointcontrast_neighbor_view_mode: second
pointcontrast_neighbor_k: 6
pointcontrast_neighbor_max_relative_distance: 0.0
pointcontrast_view_points: ${data.model_points}
pointcontrast_view_crop_mode: random
pointcontrast_rotation_mode: none
pointcontrast_rotation_deg: 10.0
pointcontrast_strain_std: 0.02
pointcontrast_strain_volume_preserve: true
pointcontrast_occlusion_mode: mixed
pointcontrast_occlusion_view: second
pointcontrast_occlusion_slab_frac: 0.0
pointcontrast_occlusion_cone_deg: 0.0
pointcontrast_invariant_mode: tensor_product
pointcontrast_invariant_max_factor: 4.0
pointcontrast_invariant_groups: 0
pointcontrast_invariant_use_third_order: true
pointcontrast_invariant_eps: 1e-6

# Keep symmetry-aware pose objective available for molecular experiments.
pose:
  enabled: false
  weight: 0.4
  start_epoch: 10
  head_hidden: 256
  jitter_std: 0.000
  strain_std: 0.000
  strain_volume_preserve: true
  seeded_forward: true
  view_rotation_mode: full
  view_rotation_deg: 0.0
  unambiguous_rotation: true
  unambiguous_margin_deg: 1.0
  curriculum_enabled: true
  curriculum_epochs: 120
  curriculum_start_deg: 8.0
  eq_center: true
  eq_l2_normalize: true
  cov_normalize: true
  head_loss_weight: 1.0
  procrustes_loss_weight: 0.35
  histogram_every_n_steps: 50
  ambiguity_use_std: true
  ambiguity_floor: 0.001

symmetry:
  type: cubic24
  beta: 30.0
  angle_eps: 1e-6

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false

analysis_cluster_method: auto
analysis_cluster_l2_normalize: true
analysis_cluster_standardize: true
analysis_cluster_pca_var: 0.98
analysis_cluster_pca_max_components: 32
analysis_cluster_k_values: [3, 4, 5, 6]
analysis_progress_every_batches: 20
analysis_test_rotation_runs: 5
analysis_test_max_samples: null
analysis_max_samples_total: 0
analysis_tsne_max_samples: 8000
analysis_tsne_n_iter: 1000
analysis_interactive_max_points: 0
analysis_md_use_all_points: true
analysis_hdbscan_enabled: false
analysis_hdbscan_fit_fraction: 0.25
analysis_hdbscan_max_fit_samples: 50000
analysis_hdbscan_target_k_min: 5
analysis_hdbscan_target_k_max: 6
analysis_hdbscan_min_cluster_size_candidates: []
analysis_hdbscan_min_samples: null
analysis_hdbscan_cluster_selection_epsilon: 0.0
analysis_hdbscan_cluster_selection_method: leaf
analysis_data_files: ['175ps.npy']
