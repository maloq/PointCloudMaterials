# Candidate MACE-MH-1 omat_pbe direct-coexistence scan. This is intentionally
# the same protocol as atomistic_al_phase_transition.yaml so model differences
# are not confounded with temperature, duration, sampling, or replica choices.

dataset_name: al_direct_coexistence_mace_mh1_omat_pbe_70304
source_generator_config: configs/simulation/atomistic/al/phase_context_70304_mh1.yaml
source_dataset: output/synthetic_data/al_phase_context_mh1_omat_pbe_70304x1
source_interface_environment: replica_000_solid_liquid_interface
source_frame_step: 1000
random_seeds: [24680, 24681, 24682, 24683]
sample_interval: 200

analysis:
  profile_bins: 26
  profile_smoothing_bins: 3
  ptm_rmsd_cutoff: 0.10
  minimum_profile_contrast: 0.20
  minimum_velocity_fit_r_squared: 0.80
  rdf_cutoff_A: 8.0
  rdf_bins: 160

temperature_runs:
  - name: temperature_0650K
    temperature_K: 650.0
    expected_direction: growth
    equilibration_steps: 5000
    production_steps: 20000
    steady_state_start_step: 5000
    steady_state_end_step: 20000
    minimum_crystalline_fraction_change: 0.03
  - name: temperature_0800K
    temperature_K: 800.0
    expected_direction: unconstrained
    equilibration_steps: 5000
    production_steps: 20000
    steady_state_start_step: 5000
    steady_state_end_step: 20000
    minimum_crystalline_fraction_change: 0.0
  - name: temperature_0850K
    temperature_K: 850.0
    expected_direction: unconstrained
    equilibration_steps: 5000
    production_steps: 20000
    steady_state_start_step: 5000
    steady_state_end_step: 20000
    minimum_crystalline_fraction_change: 0.0
  - name: temperature_0900K
    temperature_K: 900.0
    expected_direction: unconstrained
    equilibration_steps: 5000
    production_steps: 20000
    steady_state_start_step: 5000
    steady_state_end_step: 20000
    minimum_crystalline_fraction_change: 0.0
  - name: temperature_0950K
    temperature_K: 950.0
    expected_direction: unconstrained
    equilibration_steps: 5000
    production_steps: 20000
    steady_state_start_step: 5000
    steady_state_end_step: 20000
    minimum_crystalline_fraction_change: 0.0
  - name: temperature_1000K
    temperature_K: 1000.0
    expected_direction: melting
    equilibration_steps: 5000
    production_steps: 20000
    steady_state_start_step: 5000
    steady_state_end_step: 20000
    minimum_crystalline_fraction_change: 0.02

output:
  root_dir: output/synthetic_data/al_direct_coexistence_grid_mh1_omat_pbe_70304
  overwrite: false
  save_extxyz: true
  create_visualizations: true
