# Candidate simulation recipe for the MACE-MH-1 materials head. It intentionally remains
# exploratory until the Al-specific potential benchmark qualifies this exact
# checkpoint and head; it does not silently replace the MACE-MPA-0 baseline.

kind: synthetic
data_path: output/synthetic_data/al_phase_context_mh1_omat_pbe_70304x1
num_points: 80
model_points: 80
radius: 7.2
sample_type: regular
overlap_fraction: 0.50
n_samples: 0
dataset_max_samples: null
train_ratio: 0.8
drop_edge_samples: true
pre_normalize: true
normalize: true
synthetic:
  root_dir: output/synthetic_data/al_phase_context_mh1_omat_pbe_70304x1
  classes: [solid_bulk, liquid_bulk, interface]

dataset_name: al_phase_context_mace_mh1_omat_pbe_70304x1
random_seeds: [12345]

potential:
  model_name: mace-mh-1-omat-pbe
  family: MACE-MH-1
  model_path: datasets/potentials/mace-mh-1.model
  sha256: a522eb7f59c7879963d41586528f4980baf33e086c94aa92e3eafdeccad3be47
  head: omat_pbe
  source_url: https://github.com/ACEsuit/mace-foundations/releases/download/mace_mh_1/mace-mh-1.model
  license_identifier: ASL
  usage_mode: exploratory
  validation_report: null
  device: cuda
  default_dtype: float32
  # Match the MPA comparison backend exactly; hybrid/OEq requires a separate
  # benchmark record rather than an implicit model-specific substitution.
  enable_cueq: true
  enable_oeq: false
  # Keep the comparison config variable-shape for the EOS/NVE/application suite.
  compile_mode: null
  compile_fullgraph: false
  pad_num_atoms: 0
  pad_num_edges: 0
  md_property_mode: forces_stress
  neighbor_skin_A: 0.3

dynamics:
  pressure_GPa: 0.0
  target_temperature_K: 650.0
  melt_temperature_K: 1600.0
  timestep_fs: 1.0
  thermostat_time_fs: 100.0
  barostat_time_fs: 500.0
  solid_equilibration_steps: 5000
  melt_steps: 3000
  quench_steps: 1000
  quench_stages: 10
  target_equilibration_steps: 3000
  interface_evolution_steps: 1000
  sample_interval: 100

system:
  chemical_symbol: Al
  crystal_structure: fcc
  initial_lattice_constant_A: 4.05
  repetitions: [26, 26, 26]
  # Match the MPA protocol: balanced phase thicknesses for coexistence scans.
  liquid_slab_fraction: 0.50
  interface_half_width_A: 5.0

validation:
  maximum_force_eV_per_A: 20.0
  maximum_pressure_error_GPa: 0.35
  maximum_temperature_error_K: 75.0
  minimum_pair_distance_A: 1.8
  ptm_rmsd_cutoff: 0.10
  reference_density_cache: null
  maximum_relative_density_error: null
  minimum_solid_fcc_fraction: 0.85
  maximum_liquid_crystalline_fraction: 0.15
  minimum_interface_crystalline_fraction: 0.20
  maximum_interface_crystalline_fraction: 0.80

output:
  root_dir: output/synthetic_data/al_phase_context_mh1_omat_pbe_70304x1
  overwrite: false
  save_extxyz: true
  create_visualizations: true
