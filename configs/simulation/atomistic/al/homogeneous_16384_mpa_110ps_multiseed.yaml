dataset_name: al_homogeneous_crystallization_mpa_compiled_16384_110ps_multiseed
source_generator_config: configs/simulation/atomistic/al/liquid_source_16384_mpa.yaml
source_dataset: output/synthetic_data/al_liquid_source_16384_compiled_mpa_500K
source_environment: replica_000_bulk_liquid
source_frame_step: 3000

# These are the previously planned but unrun seeds. Seed 35791 produced the
# accepted reference trajectory and is intentionally excluded.
random_seeds: [35803, 35831, 35839, 35851, 35863, 35869, 35879, 35897, 35911]

temperature_K: 500.0
equilibration_steps: 5000
steps: 110000
sample_interval: 1000

analysis:
  ptm_rmsd_cutoff: 0.10
  crystalline_cluster_cutoff_A: 3.5
  nucleus_size_threshold_atoms: 100
  threshold_persistence_frames: 3
  rdf_cutoff_A: 8.0
  rdf_bins: 160

output:
  # The campaign runner owns the actual output root.
  root_dir: output/synthetic_data/al_homogeneous_16384_compiled_mpa_110ps_multiseed/unoptimized_placeholder
  overwrite: false
  save_extxyz: false
  create_visualizations: false
