homogeneous_config: configs/simulation/atomistic/al/homogeneous_16384_mpa.yaml
output_root: output/synthetic_data/al_homogeneous_campaign_16384_compiled_mpa_test_4h_20260715

# This is an explicitly exploratory timing/trajectory run. The latest strict
# selection report rejected MPA's compiled/uncompiled energy parity, so no
# scientific-selection evidence is attached or implied here.
potential_selection_report: null

execution:
  # Commit the complete MTK state every 2 ps for interruption recovery.
  chunk_steps: 2000
  event_check_interval: 250
  # Continue through the configured natural endpoint after a nucleus is detected.
  stop_on_event: false
  post_event_steps: 0
  # Preserve GPU time for MD; full PTM/RDF analysis can run after completion.
  analysis_mode: deferred
  analysis_workers: 0
  checkpoint_retention: 2
