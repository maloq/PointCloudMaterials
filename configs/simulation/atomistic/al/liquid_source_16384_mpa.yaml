# Dedicated immutable 500 K liquid-source simulation for 16,384-atom campaigns.
# The liquid-only producer ignores interface preparation fields and writes no interface.

kind: synthetic
data_path: output/synthetic_data/al_liquid_source_16384_compiled_mpa_500K
num_points: 80
model_points: 80
radius: 7.2
sample_type: regular
overlap_fraction: 0.50
n_samples: 0
dataset_max_samples: null
train_ratio: 0.8
drop_edge_samples: true
pre_normalize: true
normalize: true
synthetic:
  root_dir: output/synthetic_data/al_liquid_source_16384_compiled_mpa_500K
  classes: [liquid_bulk]

dataset_name: al_liquid_source_mace_mpa_compiled_16384_500K
random_seeds: [12345]

potential:
  model_name: mace-mpa-0-medium
  family: MACE-MPA-0
  model_path: datasets/potentials/mace-mpa-0-medium.model
  sha256: 75428afe3a1d7d8062e19bcaabd5c433623cabf308242ec9fb493e38604fb638
  head: default
  source_url: https://github.com/ACEsuit/mace-mp/releases/download/mace_mpa_0/mace-mpa-0-medium.model
  license_identifier: MIT
  usage_mode: exploratory
  validation_report: null
  device: cuda
  default_dtype: float32
  enable_cueq: true
  enable_oeq: false
  compile_mode: reduce-overhead
  compile_fullgraph: false
  pad_num_atoms: 16384
  pad_num_edges: 1200000
  md_property_mode: forces_stress
  neighbor_skin_A: 0.3

dynamics:
  pressure_GPa: 0.0
  # The immutable endpoint itself is equilibrated at the campaign temperature.
  target_temperature_K: 500.0
  melt_temperature_K: 1600.0
  timestep_fs: 1.0
  thermostat_time_fs: 100.0
  barostat_time_fs: 500.0
  # No solid endpoint is consumed. The 1600 K NPT melt has six barostat damping times
  # before quench, and the final liquid endpoint is validated independently.
  solid_equilibration_steps: 0
  melt_steps: 3000
  quench_steps: 1000
  quench_stages: 10
  target_equilibration_steps: 3000
  # Required by the shared GeneratorConfig schema; liquid-only generation never uses it.
  interface_evolution_steps: 1000
  sample_interval: 100

system:
  chemical_symbol: Al
  crystal_structure: fcc
  initial_lattice_constant_A: 4.05
  # 16^3 conventional FCC cells = 16,384 atoms.
  repetitions: [16, 16, 16]
  # Required by the shared schema; no slab or interface is constructed.
  liquid_slab_fraction: 0.50
  interface_half_width_A: 5.0

validation:
  maximum_force_eV_per_A: 20.0
  maximum_pressure_error_GPa: 0.35
  maximum_temperature_error_K: 75.0
  minimum_pair_distance_A: 1.8
  ptm_rmsd_cutoff: 0.10
  reference_density_cache: null
  maximum_relative_density_error: null
  minimum_solid_fcc_fraction: 0.85
  maximum_liquid_crystalline_fraction: 0.15
  minimum_interface_crystalline_fraction: 0.20
  maximum_interface_crystalline_fraction: 0.80

output:
  root_dir: output/synthetic_data/al_liquid_source_16384_compiled_mpa_500K
  # Immutability is enforced by rejecting overwrite=true.
  overwrite: false
  # Persist the exact 500 K endpoint for parity and timing re-use.
  save_extxyz: true
  create_visualizations: false
