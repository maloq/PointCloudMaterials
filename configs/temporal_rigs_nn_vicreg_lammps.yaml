defaults:
 - _self_

project_name: pointnet
experiment_name: TEMPORAL_RIGS_NN_VICREG_l${latent_size}_N${data.num_points}_M${data.model_points}
wandb_mode: online

model_type: temporal_rigs_vicreg
latent_size: 240

resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_encoder_only: true
run_post_training_analysis: false
run_test_after_training: true

data:
  kind: temporal_lammps
  dump_file: datasets/dump_first_10.pos
  sequence_length: 3
  frame_stride: 1
  window_stride: 2
  frame_start: 0
  frame_stop: null
  train_ratio: 0.8
  radius: null
  num_points: 160
  model_points: 80
  center_selection_mode: atom_stride
  center_atom_ids: null
  center_atom_stride: 80
  max_center_atoms: null
  center_selection_seed: 0
  center_grid_overlap: null
  center_grid_reference_frame_index: null
  normalize: true
  center_neighborhoods: true
  selection_method: closest
  cache_dir: null
  rebuild_cache: false
  tree_cache_size: 4
  precompute_neighbor_indices: true
  precompute_rigs_graph: true
  rigs_num_points: ${data.model_points}
  rigs_chunk_size: 256
  build_lock_timeout_sec: 7200.0
  build_lock_stale_sec: 86400.0
  auto_cutoff:
    enabled: true
    reference_frame_index: 0
    target_points: ${data.num_points}
    quantile: 0.995
    estimation_samples_per_file: 4000
    seed: 42
    safety_factor: 1.02
    boundary_margin: 7.2

encoder:
  name: RIGS_NN
  kwargs:
    latent_size: ${latent_size}
    node_dim: 128
    depth: 4
    r_max: 1.0
    num_radial: 32
    num_density: 16
    local_k: 16
    dropout: 0.0

learning_rate: 0.001
batch_size: 512
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 4
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 120
max_samples: 0
check_val_every_n_epoch: 5

gpu: true
devices: [0]
ddp_find_unused_parameters: false
log_every_n_steps: 5
num_workers: 6
temporal_prefetch_factor: 2
temporal_train_window_shuffle_block_size: null
temporal_train_shared_center_order: true
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
warmup_enabled: true
warmup_epochs: 5
warmup_start_factor: 0.1

decay_rate: 0.0003
enable_embedding_metrics: false
enable_svm_accuracy: false

temporal_vicreg_use_adjacent_views: true

vicreg_enabled: true
vicreg_weight: 1.0
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 15.0
vicreg_cov_coeff: 1.0
vicreg_embed_dim: 512
vicreg_start_epoch: 0
vicreg_jitter_std: 0.0
vicreg_jitter_mode: physical
vicreg_drop_ratio: 0.0
vicreg_neighbor_view: true
vicreg_neighbor_view_mode: second
vicreg_neighbor_k: 6
vicreg_neighbor_max_relative_distance: 0.0
vicreg_view_points: ${data.model_points}
vicreg_std_eps: 1e-4
vicreg_std_target: 1.0
vicreg_radial_enabled: false

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false
