defaults:
  - data: data_synth_polycrystalline_balanced_geometries
  - _self_

project_name: pointnet
experiment_name: RI_MAE_FAITHFUL_POLYCRYSTALLINE_G${ri_mae_faithful.num_group}_S${ri_mae_faithful.group_size}_D${ri_mae_faithful.trans_dim}_N${data.num_points}_M${data.model_points}
wandb_mode: online

model_type: ri_mae_faithful

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

learning_rate: 0.001
decay_rate: 0.02

batch_size: 256
precision: 32-true
gradient_clip_val: 1.0
accumulate_grad_batches: 2

epochs: 240
max_samples: 0

gpu: true
devices: [0]
ddp_find_unused_parameters: false
log_every_n_steps: 5
num_workers: 4

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1e-6

enable_swa: false
swa_epoch_start: 1000

warmup_enabled: true
warmup_epochs: 10
warmup_start_factor: 0.1

max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
enable_train_split_svm_test_metric: false

checkpoint_monitor: val/class/acc_kmeans_plusplus_hungarian
checkpoint_mode: max
checkpoint_save_top_k: 3
test_single_device: true
run_post_training_analysis: false

ri_mae_faithful:
  num_group: 24
  group_size: 12
  encoder_dims: 256
  trans_dim: 384
  depth_encoder: 12
  depth_predictor: 1
  num_heads: 6
  mask_ratio: [0.75, 0.75]
  mask_rand: true
  mlp_ratio: 4.0
  drop_path_rate: 0.1
  ema_decay: 0.99
  ema_end_decay: 0.9996
  ema_anneal_end_step: 10000
  deterministic_fps: false
  crop_mode_train: random
  crop_mode_eval: center
  center_input: false
  use_cutmix: false
  scale_translate: true
  scale_low: 0.6666666667
  scale_high: 1.5
  translate_range: 0.2

data:
  num_points: 128
  model_points: 80
  split_seed: 42
  pre_normalize: true
  normalize: true

