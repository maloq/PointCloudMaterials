defaults:
  - data: data_synth_small_crystals
project_name: pointnet
experiment_name: synth_SPD_VN_EQ_l${latent_size}_P${data.num_points}_${loss}_${batch_size}
wandb_mode: online

model_type: spd
latent_size: 96  # Number of VN channels for equivariant latent

# Optional: Load pretrained supervised encoder
load_supervised_checkpoint: False

# # VN Encoder - produces equivariant latent (B, latent_size, 3)
# encoder:
#   name: VN_DGCNN_Refined
#   kwargs:
#     latent_size: ${latent_size}
#     feature_dims: [128, 128, 256, 512, 1024]
#     pooling: "max"


# decoder: 
#   name: DiffusionEGNN
#   kwargs: 
#     latent_size: ${latent_size}
#     num_points: ${data.num_points}
#     hidden_dim: 128
#     layers: 5
#     timesteps: 100 # Fast diffusion

encoder:
  name: VN_Graph_Delaunay   # or VN_Graph_MultiScale
  kwargs:
    latent_size: ${latent_size}
    hidden_channels: [64, 128, 256, 512]
    graph_type: delaunay
    radius_cutoff: 5.0

decoder:
  name: FlowMatchingEquivariant
  kwargs:
    latent_size: ${latent_size}
    num_points: ${data.num_points}
    sample_steps: 50
    scalar_dim: 128
    vector_dim: 32
    n_layers: 6

    
# IMPORTANT: Diffusion uses its own internal MSE loss. 
# You need to disable your standard reconstruction losses in the training loop 
# or set their weights to 0 if the decoder returns the loss directly.
loss_params:
    pdist_scale: 0.0 # Handled internally by diffusion MSE
    chamfer_scale: 0.0


loss: sinkhorn
sinkhorn_blur: 0.1
sinkhorn_blur_schedule:
  enable: true
  start: 0.1
  end: 0.01
  start_epoch: 0
  duration_epochs: ${epochs}

learning_rate: 0.004
batch_size: 512

enable_swa: False
swa_epoch_start: 1000
epochs: 100

gpu: True
devices: [0, 1, 2]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine

decay_rate: 0.0004
kl_latent_loss_scale: 0.02
ortho_scale: 0.01  # Will be zero for eq_decoder mode (identity rotation)
max_samples: 0
# Curriculum learning settings
curriculum_learning:
  enable: True
  start_fraction: 0.0
  end_fraction: 1.0
  start_epoch: 10
  end_epoch: 50
