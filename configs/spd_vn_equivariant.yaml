defaults:
  - data: synth_modelnet
project_name: pointnet
experiment_name: synth_SPD_VN_EQ_l${latent_size}_P${data.num_points}_${loss}_${batch_size}
wandb_mode: online

model_type: spd
latent_size: 96  # Number of VN channels for equivariant latent

# Optional: Load pretrained supervised encoder
load_supervised_checkpoint: False

# VN Encoder - produces equivariant latent (B, latent_size, 3)
encoder:
  name: VN_DGCNN_Refined
  kwargs:
    latent_size: ${latent_size}
    feature_dims: [128, 128, 256, 512, 1024]
    pooling: "max"

decoder:
  name: VN_Snowflake
  kwargs:
    num_points: ${data.num_points}  # Must be num_seeds * 2^num_stages
    latent_size: ${latent_size}
    num_seeds: 16                   # Starting seed points
    hidden_channels: 64             # VN feature channels
    k: 16                           # kNN neighbors in attention
    use_batchnorm: True
    negative_slope: 0.1
    # Stability parameters
    temperature: 2.0                # Higher = smoother attention, more stable
    residual_scale: 0.3             # Lower = more stable residual connections
    disp_scale: 0.05                # Lower = smaller displacements, more stable

loss_params:
    chamfer:
      point_reduction: "mean"
      squared: False
      auto_scale_by_points: False

loss: sinkhorn
sinkhorn_blur: 0.1
sinkhorn_blur_schedule:
  enable: true
  start: 0.1
  end: 0.01
  start_epoch: 0
  duration_epochs: ${epochs}

learning_rate: 0.0005
batch_size: 64

# Gradient clipping for stability
gradient_clip_val: 1.0

enable_swa: False
swa_epoch_start: 1000
epochs: 100

gpu: True
devices: [0]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine

decay_rate: 0.0004
kl_latent_loss_scale: 0.02
ortho_scale: 0.01  # Will be zero for eq_decoder mode (identity rotation)
max_samples: 0
# Curriculum learning settings
curriculum_learning:
  enable: False
  start_fraction: 0.0
  end_fraction: 1.0
  start_epoch: 10
  end_epoch: 50
