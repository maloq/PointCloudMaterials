defaults:
#  - data: data_synth_polycrystalline
  - data: data_ae_Al_80

project_name: pointnet
experiment_name: SUPERVISED_ENCODER_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: supervised_encoder
latent_size: 80  # Number of VN channels for equivariant latent

# VN Encoder - produces equivariant latent (B, latent_size, 3) and invariant latent (B, latent_size)
encoder:
  name: VN_REVNET_Backbone
  kwargs:
    latent_size: ${latent_size}
    sa_npoints: [80, 40]
    sa_channels: [128, 256]
    attn_hidden: 256

# Decoder config is required by the model factory but is not used for supervised encoder
# (kept for compatibility with the model factory)
decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}

# Training parameters
learning_rate: 0.003
batch_size: 512
precision: bf16-true
gradient_clip_val: 1.0

enable_swa: False
swa_epoch_start: 1000
epochs: 120
max_samples: 0

gpu: True
devices: [0, 1]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
debug_startup: false
debug_faulthandler_timeout: 60

decay_rate: 0.0000

# Supervised head
class_loss_weight: 1.0
barlow_embed_dim: 120
supervised_projector_dim: ${barlow_embed_dim}

# Data augmentation (applied in dataloaders)
augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false
