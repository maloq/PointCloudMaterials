defaults:
  - data: synth_modelnet_objects
  - _self_

project_name: pointnet
experiment_name: RI_MAE_MODELNET40_G${ri_mae.num_group}_S${ri_mae.group_size}_D${ri_mae.trans_dim}
wandb_mode: online

model_type: ri_mae

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

learning_rate: 0.001
decay_rate: 0.05

batch_size: 96
precision: 32-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1

epochs: 600
max_samples: 0

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: false
log_every_n_steps: 10
num_workers: 6

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1e-6

enable_swa: false
swa_epoch_start: 1000

warmup_enabled: true
warmup_epochs: 10
warmup_start_factor: 0.1

# Supervised cache + class-accuracy metrics.
max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
enable_train_split_svm_test_metric: true
train_split_svm_max_samples: 12000
train_split_svm_c: 0.018
val_cluster_acc_methods: [kmeans, kmeans++]
val_cluster_acc_runs: 1
test_cluster_acc_methods: [kmeans, kmeans++, gmm_full]
test_cluster_acc_runs: 1
test_cluster_acc_runs_by_method:
  kmeans: 20

# Representation-quality checkpointing + single-device testing.
checkpoint_monitor: val/class/encoder_linear_svm_accuracy
checkpoint_mode: max
checkpoint_save_top_k: 3
test_single_device: true

ri_mae:
  num_group: 64
  group_size: 32
  encoder_dims: 384
  trans_dim: 384
  depth: 8
  predictor_depth: 2
  num_heads: 6
  mlp_ratio: 4.0
  dropout: 0.0
  mask_ratio: 0.75
  ema_decay: 0.996
  deterministic_fps: false
  sorting_mode: nearest
  crop_mode: random

data:
  modelnet_split: train
  train_ratio: 0.9
  num_points: 1024
  model_points: 1024
  add_center_point: false
  pre_normalize: true
  normalize: true
  augmentation:
    rotation_scale: 1.0
    noise_scale: 0.0
    jitter_scale: 0.0
    scaling_range: 0.0
    track_augmentation: false
