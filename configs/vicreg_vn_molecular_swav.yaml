defaults:
  - vicreg_vn_molecular
  - _self_

experiment_name: VICREG_SWAV_l${latent_size}_K${swav_num_prototypes}_N${data.num_points}_M${data.model_points}_${encoder.name}

# SwAV (self-supervised prototype assignment)
swav_enabled: true
swav_weight: 1.0
swav_projection_dim: 128
swav_hidden_dim: 512
swav_num_prototypes: 16
swav_temperature: 0.1
swav_epsilon: 0.05
swav_sinkhorn_iterations: 12
swav_start_epoch: 0
swav_freeze_prototypes_steps: 0
swav_view_mode: center_adjacent
swav_view_points: ${data.model_points}
