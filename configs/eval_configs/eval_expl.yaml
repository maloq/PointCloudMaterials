dataset:
  config: configs/data/data_ae_Al_80.yaml
  override:
    data_files:
      - 175ps.off

prediction:
  model_type: soap  # autoencoder or spd or soap
  checkpoint: output/eval_results/spd_08-10_22-45_SPD_FoldingSphereAttnRes_l72_P80_Sinkhorn_512-epoch=20-val_loss=0.06/SPD_FoldingSphereAttnRes_l72_P80_Sinkhorn_512-epoch=20-val_loss=0.06.ckpt
  cuda_device: 0
  batch_size: 512
  max_samples: 100000

metrics:
  # Define multiple clusterings. Each will be used to compute all single-run metrics.
  clusterings:
    - method: kmeans
      params:
        n_clusters: 2
    - method: kmeans
      params:
        n_clusters: 3
    - method: kmeans
      params:
        n_clusters: 4
    - method: kmeans
      params:
        n_clusters: 5
    - method: kmeans
      params:
        n_clusters: 6
    - method: gmm
      params:
        n_components: 3
    - method: gmm
      params:
        n_components: 4
    - method: gmm
      params:
        n_components: 4
    - method: gmm
      params:
        n_components: 6
    - method: hdbscan
      params:
        min_cluster_size: 10
    - method: hdbscan
      params:
        min_cluster_size: 20
    - method: hdbscan
      params:
        min_cluster_size: 30
    - method: hdbscan
      params:
        min_cluster_size: 50
    - method: hdbscan
      params:
        min_cluster_size: 200
    - method: hdbscan
  single_run:
    - name: silhouette
    - name: reconstruction_chamfer
    - name: reconstruction_emd
  multi_run:
    - name: rotational_consistency
      params:
        n_rotations: 4
        sphere_radius: 7.4
        n_points: 80
        # Make centre filtering less aggressive to avoid empty centre set
        edge_margin_factor: 1.0
        # Consider sampling more candidate centres for robustness
        n_centres: 500
        batch_size: 1024