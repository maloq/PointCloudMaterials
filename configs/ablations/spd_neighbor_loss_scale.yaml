experiment:
  config_name: spd_synth
  config_path: configs
  base_overrides:
    - wandb_mode=offline
    - log_every_n_steps=10
variable:
  override: neighbor_loss_scale
  values: [0.0, 0.05, 0.1, 0.5, 1.0]
metrics:
  final:
    - train/loss
    - val/loss
    - val/chamfer
    - val/phase/nmi
  best:
    - name: val/loss
      mode: min
    - name: val/phase/nmi
      mode: max
output:
  root_dir: output/ablations
  run_name: spd_neighbor_loss_scale
