experiment:
  config_name: spd_synth_small
  config_path: configs
  base_overrides:
    - wandb_mode=offline
    - log_every_n_steps=10
    - precision=bf16-mixed
variable:
  override: batch_size
  values: [256, 257, 258, 259, 260, 261, 262, 263, 264, 265]
metrics:
  final:
    - train/loss
    - train/chamfer
    - val/loss
    - val/chamfer
    - val/emd
    - val/phase/nmi
    - val/phase/ari
    - val/phase/silhouette
    - train/phase/nmi 
    - train/phase/ari
  best:
    - name: val/loss
      mode: min
    - name: val/phase/nmi
      mode: max
    - name: val/emd
      mode: min
    - name: val/phase/silhouette
      mode: max
    - name: val/phase/ari
      mode: max
output:
  root_dir: output/ablations
  run_name: spd_mean_and_std
