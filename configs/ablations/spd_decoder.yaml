experiment:
  config_name: spd_synth
  config_path: configs
  base_overrides:
    - wandb_mode=offline
    - log_every_n_steps=10
    - precision=bf16-mixed
variable:
  override: decoder
  values:
    - label: folding_attn
      name: FoldingSphereAttn
      kwargs:
        latent_size: 36
        num_points: 64 
        dropout_rate: 0.1
        n_shells: 2
        R1: 0.5
        R2: 1.0
        hidden_dim: 512
        R_att: 1.0
    - label: folding_base
      name: FoldingSphere
      replace_kwargs: true
      kwargs:
        latent_size: 36
        num_points: 64
        n_shells: 2
        dropout_rate: 0.1
        R1: 0.5
        R2: 1.0
        hidden_dim: 512
    - label: folding_two_step
      name: Folding
      replace_kwargs: true
      kwargs:
        latent_size: 36
        num_points: 64
        dropout_rate: 0.1
        hidden_dim: 512
    - label: folding_two_step_attn
      name: FoldingTwoStepAttn
      replace_kwargs: true
      kwargs:
        latent_size: 36
        num_points: 64
        dropout_rate: 0.1
        hidden_dim: 512
    - label: mlp
      name: MLP
      replace_kwargs: true
      kwargs:
        latent_size: 36
        num_points: 64
metrics:
  final:
    - train/loss
    - train/chamfer
    - val/loss
    - val/chamfer
    - val/emd
    - val/phase/nmi
    - val/phase/ari
    - val/phase/silhouette
    - train/phase/nmi 
    - train/phase/ari
  best:
    - name: val/loss
      mode: min
    - name: val/phase/nmi
      mode: max
    - name: val/phase/ari
      mode: max
    - name: val/emd
      mode: min
    - name: val/phase/silhouette
      mode: max
output:
  root_dir: output/ablations
  run_name: spd_decoder_36
