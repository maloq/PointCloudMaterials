defaults:
  - data: data_synth_no_perturb
project_name: pointnet
experiment_name: supervised_encoder_${encoder.name}_l${latent_size}_bs${batch_size}
wandb_mode: online

# Supervised encoder pretraining settings
model_type: supervised_encoder
latent_size: 36

# Use same encoder as main SPD config
encoder:
  name: VN_DGCNN # VN_DGCNN
  kwargs:
    latent_size: ${latent_size}

# Decoder not needed for supervised pretraining, but required by factory
decoder:
  name: FoldingSphereAttnRes
  kwargs:
    latent_size: ${latent_size}
    num_points: ${data.num_points}
    dropout_rate: 0.1
    n_shells: 2
    R1: 0.5
    R2: 1.0
    hidden_dim: 256
    R_att: 0.5
    learnable_template: False

# Rotation network configuration (same as main SPD config)
rot_net:
  name: Rot6DHead
  kwargs:
    hidden: 256
    use_attention: True

rotation_mode: sixd_head

# Phase prediction head settings
num_phases: 5  # Will be automatically updated based on reference point clouds
phase_head_hidden: 32

# Loss weights
phase_loss_weight: 1.0
rotation_loss_weight: 0.2
geodesic_loss_weight: 1.0
# Data augmentation
use_rotation_augmentation: True  # Apply random rotations during training

# Training settings (same as main SPD config)
max_samples: 0  # no limit
torch_compile: True

learning_rate: 0.006
batch_size: 1024

enable_swa: False
swa_epoch_start: 1000
epochs: 50  # More epochs for supervised pretraining

gpu: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine

decay_rate: 0.0004

