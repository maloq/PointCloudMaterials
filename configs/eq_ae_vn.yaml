defaults:
  - data: synth_modelnet_objects
project_name: pointnet
experiment_name: EQ_AE_l${latent_size}_P${data.num_points}_${loss}_${decoder.name}
wandb_mode: online

model_type: eq_ae  # Equivariant Autoencoder
latent_size: 128  # Number of VN channels for equivariant latent

# Optional: Load pretrained supervised encoder
load_supervised_checkpoint: False

# VN Encoder - produces equivariant latent (B, latent_size, 3) and invariant latent (B, latent_size)

encoder:
  name: VN_REVNET_Backbone
  kwargs:
    latent_size: ${latent_size}
    sa_npoints: [128, 32]
    
# encoder:
#   name: VN_DGCNN_Refined
#   kwargs:
#     latent_size: ${latent_size}
#     feature_dims: [128, 256, 256, 512, 512]
#     pooling: "max"
#     use_cross_product: True

decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.num_points}
    latent_size: ${latent_size}
    num_anchors: 64
    anchor_channels: 48
    transformer_depth: 3
    attn_hidden: 128


# Disable batchnorm and use larger output_scale for proper reconstruction.
# decoder:
#   name: VN_Equivariant
#   kwargs:
#     num_points: ${data.num_points}
#     latent_size: ${latent_size}
#     hidden_dims: [1024, 1024, 512]
#     use_batchnorm: False  # IMPORTANT: VN batchnorm keeps outputs small
#     negative_slope: 0.1
#     output_scale: 10.0  
#     learnable_scale: True 
#     num_res_blocks: 4
#     center_output: True  # Keep reconstructions centered


#  MLP baseline test
# decoder:
#   name: MLPLarge
#   kwargs:
#     num_points: ${data.num_points}
#     latent_size: ${latent_size}
#     hidden_dims: [1024, 1024, 512, 256]
#     use_batchnorm: True
#     dropout_rate: 0.0

loss_params:
    chamfer:
      point_reduction: "mean"
      auto_scale_by_points: False

loss: chamfer
sinkhorn_blur: 0.1
sinkhorn_blur_schedule:
  enable: false
  start: 0.1
  end: 0.01
  start_epoch: 0
  duration_epochs: ${epochs}

# Training parameters
learning_rate: 0.0015
batch_size: 64
precision: 32-true
# Gradient clipping for stability (use 0 to disable)
gradient_clip_val: 1.0

enable_swa: False
swa_epoch_start: 1000
epochs: 600 

gpu: True
devices: [0]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine

decay_rate: 0.0004
kl_latent_loss_scale: 0.0
max_samples: 0
load_pretrained_ae: False
pretrained_ae_checkpoint: null

# IDEC clustering (disabled by default; enable after AE pretraining)
idec_enabled: False
idec_num_clusters: 0
idec_gamma: 0.1
idec_update_interval: 200
idec_delta: 0.001
idec_max_iter: null
idec_use_global_p: True
idec_normalize_z: True
idec_init_kmeans: True

# Barlow Twins (self-supervised invariants)
barlow_enabled: True
barlow_weight: 0.01
barlow_lambda: 0.005
barlow_embed_dim: 128
barlow_start_epoch: 0
barlow_jitter_std: 0.01
barlow_drop_ratio: 0.2
