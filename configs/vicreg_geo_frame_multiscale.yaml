defaults:
  - vicreg_geo_frame_multi
  - _self_

experiment_name: VICREG_GEOFRAME_MULTISCALE_12_24_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}

# Verified full BF16 forward/backward peak on H100 NVL: ~39.7 GiB allocated,
# ~49.8 GiB reserved. This leaves ample room for trainer/runtime variation.
batch_size: 16384

# Two local receptive fields at the same FPS centers. Scale-specific patch
# encoders and embeddings are fused into one token per center before attention.
encoder:
  kwargs:
    patch_sizes: [12, 24]
    use_frame_gating: false
