defaults:
#  - data: data_ae_Al_80
  - data: data_synth_polycrystalline_balanced_geometries
  - _self_

project_name: pointnet
experiment_name: RI_MAE_MOLECULAR_G${ri_mae.num_group}_S${ri_mae.group_size}_D${ri_mae.trans_dim}_N${data.num_points}_M${data.model_points}
wandb_mode: online

model_type: ri_mae

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

learning_rate: 0.001
decay_rate: 0.02

batch_size: 128
precision: 32-true
gradient_clip_val: 1.0
accumulate_grad_batches: 2

epochs: 240
max_samples: 0

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: false
log_every_n_steps: 5
num_workers: 4

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1e-6

enable_swa: false
swa_epoch_start: 1000

warmup_enabled: true
warmup_epochs: 10
warmup_start_factor: 0.1

# Supervised metrics that rely on class labels will be skipped automatically
# on real molecular crops that do not expose class_id metadata.
max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
enable_train_split_svm_test_metric: false

# Monitor clustering accuracy directly for checkpoint selection.
checkpoint_monitor: val/class/acc_kmeans_plusplus_hungarian
checkpoint_mode: max
checkpoint_save_top_k: 3
test_single_device: true

ri_mae:
  # Tuned for molecular crops with model_points=80.
  num_group: 24
  group_size: 12
  encoder_dims: 384
  trans_dim: 384
  depth: 8
  predictor_depth: 2
  num_heads: 6
  mlp_ratio: 4.0
  dropout: 0.0
  mask_ratio: 0.6
  ema_decay: 0.996
  deterministic_fps: false
  sorting_mode: nearest
  crop_mode_train: random
  crop_mode_eval: center

# Keep core point-cloud settings explicit for readability.
data:
  num_points: 128
  model_points: 80
  split_seed: 42
  pre_normalize: true
  normalize: true
