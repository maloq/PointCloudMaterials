defaults:
  - data: data_ae_Al_80
  - _self_

project_name: pointnet
experiment_name: VICREG_FT_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: vicreg
latent_size: 512

load_supervised_checkpoint: false
# Fresh finetune: load model weights from the pretrained checkpoint and reset optimizer/epoch state.
resume_from_checkpoint: null
init_from_checkpoint: output/2026-03-10/13-36-40/VICREG_l512_N160_M80_RI_MAE_Invariant-epoch=09.ckpt
init_from_checkpoint_strict: false

encoder:
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 512
    trans_dim: 256
    depth: 8
    predictor_depth: 4
    num_heads: 16
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: nearest
    center_input: true

decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}

# Smaller-data finetuning defaults: lower LR and smaller per-device batch than the pretrain run.
learning_rate: 0.0003
batch_size: 4096
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 30
# Override max_samples or data.n_samples at launch time if you want to finetune on a strict subset.
max_samples: 0
check_val_every_n_epoch: 1
run_post_training_analysis: false
run_test_after_training: true

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: true
log_every_n_steps: 5
num_workers: 4
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
warmup_enabled: true
warmup_epochs: 4
warmup_start_factor: 0.1

decay_rate: 0.0004
enable_embedding_metrics: false
enable_svm_accuracy: false

idec_enabled: false
idec_num_clusters: 0
idec_gamma: 0.1
idec_update_interval: 200
idec_delta: 0.001
idec_max_iter: null
idec_use_global_p: true
idec_normalize_z: true
idec_init_kmeans: true

vicreg_enabled: true
vicreg_weight: 1.0
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 25.0
vicreg_cov_coeff: 1.0
vicreg_embed_dim: 120
vicreg_start_epoch: 0
vicreg_jitter_std: 0.01
vicreg_jitter_mode: physical
vicreg_drop_ratio: 0.0
vicreg_neighbor_view: true
vicreg_neighbor_view_mode: second
vicreg_neighbor_k: 6
vicreg_view_points: ${data.model_points}
vicreg_rotation_mode: none
vicreg_rotation_deg: 10.0
vicreg_strain_std: 0.02
vicreg_strain_volume_preserve: true
vicreg_occlusion_mode: mixed
vicreg_occlusion_view: second
vicreg_occlusion_prob: 0.25
vicreg_occlusion_slab_frac: 0.0
vicreg_occlusion_cone_deg: 0.0
vicreg_std_eps: 1e-4
vicreg_std_target: 1.0
vicreg_radial_enabled: false
vicreg_radial_beta1: 1.0
vicreg_radial_beta2: 0.1
vicreg_radial_m: null
vicreg_radial_eps: 1e-8

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false
