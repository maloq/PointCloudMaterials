# Mo3ENet Configuration for Molecular/Crystal Data
# Optimized for smaller point clouds (80 points) where GM loss works well
# Uses polycrystalline metal dataset with multiple crystal phases

defaults:
  - data: data_synth_polycrystalline
  - _self_

project_name: mo3enet
experiment_name: mo3enet_molecular_l${latent_k}_s${swarm_m}_${batch_size}
wandb_mode: online

model_type: mo3enet

# -------------------------
# Mo3ENet Model Settings
# -------------------------

# Multi-type support (phases as types)
multi_type: false        # Set to true if you want to use phase labels as types
num_types: 1             # Number of atom/point types (or 5 for the 5 phases)

# Encoder settings (EGNN-based) - full capacity for molecular data
type_emb_dim: 32         # Type embedding dimension
h_dim: 256               # Hidden dimension for EGNN layers
msg_dim: 128             # Message dimension
latent_k: 64             # Number of latent vectors (equivariant output size)
n_layers: 4              # Number of EGNN layers
num_rbfs: 32             # Number of radial basis functions
cutoff: 0.8              # Distance cutoff - slightly larger for crystal structures
dropout: 0.05            # Dropout rate

# Decoder settings (Equivariant Swarm Decoder)
swarm_m: 128             # Output swarm points (1.5-2x input points for molecules)
attn_dim: 64             # Attention dimension
query_dim: 64            # Query dimension
hidden_s: 128            # Hidden dimension for decoder MLPs

# Normalization
radius_norm: 1.0         # Data is already normalized to [-1,1]

# -------------------------
# Loss Settings
# -------------------------

# For molecular data (80 points), GM loss is appropriate
use_chamfer_loss: true   # Also use Chamfer for stability
gm_weight: 1.0           # Enable GM loss for molecular data
chamfer_weight: 0.5      # Chamfer loss helps with convergence

# GM loss parameters (tuned for 80 points)
gm_sigma: 0.15           # Gaussian width for normalized data
gm_type_scale: 0.0       # 0 for single-type, increase if using multi_type
gm_use_self_target: true # Self-target works well for small N
gm_loss_mode: mxtal      # MXtalTools-style overlap loss (SmoothL1, exp(-(d/sigma)^2))
gm_weight_temperature: 1.0
gm_type_loss_weight: 0.0
gm_minw_log10_threshold: 2.0
gm_smooth_l1_beta: 1.0
gm_matching_eps: 0.01
gm_sphere_penalty: 0.1   # Penalty for points outside unit sphere
gm_minw_penalty: 0.1     # Penalty for vanishing weights
gm_minw_frac: 0.01       # Minimum weight fraction

# Sigma annealing schedule (decrease sigma for sharper reconstruction)
sigma_schedule:
  enable: true
  start: 0.25            # Start with broader overlap
  end: 0.08              # End with sharper reconstruction
  start_epoch: 0
  end_epoch: ${epochs}

# -------------------------
# Training Settings
# -------------------------

learning_rate: 0.0005    # Conservative LR for stability
batch_size: 512           # Can use larger batch with 80 points (O(N²) = 6400)

# Gradient clipping for stability
gradient_clip_val: 1.0

enable_swa: false
swa_epoch_start: 1000
epochs: 36

gpu: true
devices: [0]
ddp_find_unused_parameters: true
log_every_n_steps: 10
num_workers: 4
scheduler_gamma: 0.5
scheduler_name: Cosine

# Regularization
decay_rate: 0.0001
kl_latent_loss_scale: 0.0

# Cache settings for metrics
max_cache_samples: 8192
max_test_samples: 2000
max_samples: 0
