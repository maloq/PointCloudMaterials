defaults:
 - _self_

project_name: pointnet
experiment_name: TEMPORAL_VICREG_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: temporal_vicreg
latent_size: 128

resume_from_checkpoint: null
init_from_checkpoint: null
run_post_training_analysis: false
run_test_after_training: true

data:
  kind: temporal_lammps
  dump_file: datasets/dump_Pure_Al_500K.pos
  sequence_length: 3
  frame_stride: 1
  window_stride: 1
  frame_start: 0
  frame_stop: null
  train_ratio: 0.8
  radius: 12.0
  num_points: 96
  model_points: 96
  center_selection_mode: atom_stride
  center_atom_ids: null
  center_atom_stride: 32
  max_center_atoms: null
  center_selection_seed: 0
  center_grid_overlap: null
  center_grid_reference_frame_index: null
  normalize: true
  center_neighborhoods: true
  selection_method: closest
  cache_dir: null
  rebuild_cache: false
  tree_cache_size: 4
  build_lock_timeout_sec: 7200.0
  build_lock_stale_sec: 86400.0
  auto_cutoff:
    enabled: false
    reference_frame_index: 0
    target_points: ${data.num_points}
    quantile: 1.0
    estimation_samples_per_file: 4096
    seed: 0
    safety_factor: 1.0

encoder:
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 512
    trans_dim: 64
    depth: 8
    predictor_depth: 4
    num_heads: 4
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: nearest
    center_input: true

decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}

learning_rate: 0.003
batch_size: 512
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 120
max_samples: 0
check_val_every_n_epoch: 5

gpu: true
devices: [0]
ddp_find_unused_parameters: true
log_every_n_steps: 5
num_workers: 4
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
warmup_enabled: true
warmup_epochs: 5
warmup_start_factor: 0.05

decay_rate: 0.0004
contrastive_norms_only_latent: true
enable_embedding_metrics: false
enable_svm_accuracy: false

temporal_center_frame_index: null
temporal_vicreg_use_adjacent_views: true

barlow_enabled: false
barlow_weight: 0.0

vicreg_enabled: true
vicreg_weight: 1.0
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 25.0
vicreg_cov_coeff: 1.0
vicreg_embed_dim: 120
vicreg_start_epoch: 0
vicreg_jitter_std: 0.01
vicreg_jitter_mode: physical
vicreg_drop_ratio: 0.0
vicreg_neighbor_view: false
vicreg_neighbor_view_mode: none
vicreg_neighbor_k: 8
vicreg_neighbor_max_relative_distance: 0.0
vicreg_view_points: ${data.model_points}
vicreg_view_crop_mode: nearest_origin
vicreg_drop_apply_to_both: true
vicreg_rotation_mode: none
vicreg_rotation_deg: 0.0
vicreg_strain_std: 0.0
vicreg_strain_volume_preserve: true
vicreg_occlusion_mode: none
vicreg_occlusion_view: second
vicreg_occlusion_slab_frac: 0.0
vicreg_occlusion_cone_deg: 0.0
vicreg_occlusion_prob: 1.0
vicreg_std_eps: 1e-4
vicreg_std_target: 1.0
vicreg_invariant_mode: passthrough
vicreg_invariant_max_factor: 4.0
vicreg_invariant_groups: 0
vicreg_invariant_use_third_order: true
vicreg_invariant_eps: 1e-6
vicreg_radial_enabled: false
vicreg_radial_beta1: 1.0
vicreg_radial_beta2: 0.1
vicreg_radial_m: null
vicreg_radial_eps: 1e-8

wmse_enabled: false
wmse_weight: 0.0

pointcontrast_enabled: false
pointcontrast_weight: 0.0

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false
