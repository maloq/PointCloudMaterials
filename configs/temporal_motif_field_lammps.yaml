defaults:
  - _self_

project_name: pointnet
experiment_name: TMF_l${latent_size}_S${tmf.stable.num_prototypes}_B${tmf.bridge.num_prototypes}_C${tmf.context_frames}_${encoder.name}

wandb_mode: online
model_type: temporal_motif_field

latent_size: 256

resume_from_checkpoint: null
init_from_checkpoint: output/2026-04-16/16-19-29/TEMPORAL_VICREG_l256_N160_M80_RI_MAE_Invariant-epoch=14.ckpt
init_from_checkpoint_encoder_only: true

run_post_training_analysis: false
run_test_after_training: true

data:
  kind: temporal_lammps
  dump_file: datasets/dump_first_10.pos
  sequence_length: 9                # must satisfy >= tmf.context_frames + max(tmf.lags)
  frame_stride: 1
  window_stride: 4
  frame_start: 0
  frame_stop: null
  train_ratio: 0.8

  radius: null
  num_points: 160
  model_points: 80

  center_selection_mode: atom_stride
  center_atom_ids: null
  center_atom_stride: 80
  max_center_atoms: null
  center_selection_seed: 0
  center_grid_overlap: null
  center_grid_reference_frame_index: null

  normalize: true
  center_neighborhoods: true
  selection_method: closest

  cache_dir: null
  rebuild_cache: false
  tree_cache_size: 4
  precompute_neighbor_indices: true
  build_lock_timeout_sec: 7200.0
  build_lock_stale_sec: 86400.0

  auto_cutoff:
    enabled: true
    reference_frame_index: 0
    target_points: ${data.num_points}
    quantile: 0.995
    estimation_samples_per_file: 4000
    seed: 42
    safety_factor: 1.02
    boundary_margin: 7.2

encoder:
  # Start with the existing encoder for integration stability.
  # After the method is stable, switch this to the repo's atomistic equivariant encoder wrapper.
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 512
    trans_dim: 128
    depth: 8
    predictor_depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: nearest
    center_input: true

learning_rate: 3.0e-4
batch_size: 1024
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 2

# Enable torch.compile on student encoder + EMA teacher encoder.
# Use false to disable, or pass a string mode ("default", "reduce-overhead", "max-autotune").
compile_encoder: true

auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000

epochs: 30
max_samples: 0
check_val_every_n_epoch: 2

gpu: true
devices: [0]
ddp_find_unused_parameters: true
log_every_n_steps: 10
num_workers: 12
temporal_prefetch_factor: 4
temporal_train_window_shuffle_block_size: null

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1.0e-6
warmup_enabled: false
decay_rate: 3.0e-4

enable_embedding_metrics: false
enable_svm_accuracy: false

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false

# Keep VICReg as the geometry-preserving regularizer.
vicreg_enabled: true
vicreg_weight: 0.25
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 15.0
vicreg_cov_coeff: 1.0
vicreg_embed_dim: 256
vicreg_start_epoch: 0
vicreg_jitter_std: 0.01
vicreg_jitter_mode: physical
vicreg_drop_ratio: 0.0
vicreg_neighbor_view: true
vicreg_neighbor_view_mode: second
vicreg_neighbor_k: 8
vicreg_neighbor_max_relative_distance: 0.0
vicreg_view_points: ${data.model_points}
vicreg_std_eps: 1.0e-4
vicreg_std_target: 1.0
vicreg_radial_enabled: false

tmf:
  use_eq_norms_for_invariant: true
  stopgrad_targets: true
  teacher_ema_decay: 0.996

  anchor_policy: last_context_frame
  context_frames: 5
  lags: [1, 2, 4]

  stages:
    stage0_warmup_epochs: 8
    stage1_stable_epochs: 20
    stage2_bridge_epochs: 20
    stage3_field_epochs: 12

  projector:
    hidden_dim: 512
    output_dim: ${latent_size}
    num_layers: 2
    dropout: 0.0

  residual:
    enabled: true
    dim: 64
    weight: 0.5

  stable:
    enabled: true
    num_prototypes: 32
    temperature: 0.10
    recon_weight: 1.0
    balance_weight: 0.05
    sample_entropy_weight: 0.005
    min_active_fraction_warn: 0.30

  temporal:
    enabled: true
    model_type: transformer        # transformer | gru | mlp
    hidden_dim: 256
    depth: 4
    num_heads: 8
    dropout: 0.1

    future_stable_weight: 1.0
    future_residual_weight: 0.5
    lag_weights: [1.0, 0.8, 0.6]

  hazard:
    enabled: true
    hidden_dim: 128
    weight: 0.2
    focal_gamma: 0.0

  bridge:
    enabled: true
    num_prototypes: 16
    temperature: 0.12
    weight: 0.5
    separation_weight: 0.10
    separation_margin: 0.75

    mining_enabled: true
    refresh_epochs: 5
    candidate_fraction: 0.20
    train_subset_max_samples: 200000
    score_weights:
      stable_change: 1.0
      prediction_error: 0.5
      hazard: 0.5
      entropy: 0.25

  field:
    enabled: false
    lag: 1
    neighbor_k: 8
    hidden_dim: 128
    depth: 2
    weight: 0.2

  logging:
    log_prototype_usage_every_n_steps: 50
    log_future_acc_by_lag: true
    log_hazard_stats: true
