defaults:
  - data: data_synth_polycrystalline
project_name: pointnet
experiment_name: EQ_AE_l${latent_size}_N${data.num_points}_M${data.model_points}_${loss}_${decoder.name}
wandb_mode: online

model_type: eq_ae  # Equivariant Autoencoder
latent_size: 120  # Number of VN channels for equivariant latent

# Optional: Load pretrained supervised encoder
load_supervised_checkpoint: False

data:
  synthetic:
    classes: ['bcc_iron_pristine', 'fcc_iron_austenite' , 'bcc_iron_defected']

# VN Encoder - produces equivariant latent (B, latent_size, 3) and invariant latent (B, latent_size)

encoder:
  name: VN_REVNET_Backbone
  kwargs:
    latent_size: ${latent_size}
    sa_npoints: [80, 40]
    
# encoder:
#   name: VN_DGCNN_Refined
#   kwargs:
#     latent_size: ${latent_size}
#     feature_dims: [128, 256, 256, 512, 512]
#     pooling: "max"
#     use_cross_product: True

decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}
    num_anchors: 40
    anchor_channels: 96
    transformer_depth: 4
    attn_hidden: 256
    point_allocation: balanced  # options: truncate | balanced
    use_invariant_anchor_pos: false
    point_query_dim: 64
    rich_invariants: True
    rbf_dim: 16
    rbf_cutoff: 1.5
    offset_mlp_hidden: 512

# Disable batchnorm and use larger output_scale for proper reconstruction.
# decoder:
#   name: VN_Equivariant
#   kwargs:
#     num_points: ${data.num_points}
#     latent_size: ${latent_size}
#     hidden_dims: [1024, 1024, 512]
#     use_batchnorm: False  # IMPORTANT: VN batchnorm keeps outputs small
#     negative_slope: 0.1
#     output_scale: 10.0  
#     learnable_scale: True 
#     num_res_blocks: 4
#     center_output: True  # Keep reconstructions centered


#  MLP baseline test
# decoder:
#   name: MLPLarge
#   kwargs:
#     num_points: ${data.num_points}
#     latent_size: ${latent_size}
#     hidden_dims: [1024, 1024, 512, 256]
#     use_batchnorm: True
#     dropout_rate: 0.0

loss_params:
    chamfer:
      point_reduction: "mean"
      auto_scale_by_points: False

loss: sinkhorn
sinkhorn_blur: 0.1
sinkhorn_blur_schedule:
  enable: false
  start: 0.1
  end: 0.01
  start_epoch: 0
  duration_epochs: ${epochs}

# Training parameters
learning_rate: 0.003
batch_size: 400
precision: bf16-true
gradient_clip_val: 1.0

enable_swa: False
swa_epoch_start: 1000
epochs: 200

gpu: True
devices: [0, 1]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 4
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6

decay_rate: 0.0000
kl_latent_loss_scale: 0.0
max_samples: 0
load_pretrained_ae: False
pretrained_ae_checkpoint: null

# IDEC clustering (disabled by default; enable after AE pretraining)
idec_enabled: False
idec_num_clusters: 0
idec_gamma: 0.1
idec_update_interval: 200
idec_delta: 0.001
idec_max_iter: null
idec_use_global_p: True
idec_normalize_z: True
idec_init_kmeans: True

# Barlow Twins (self-supervised invariants)
barlow_enabled: True
barlow_weight: 0.002
barlow_lambda: 0.005
barlow_embed_dim: 120
barlow_start_epoch: 12
barlow_jitter_std: 0.003
barlow_drop_ratio: 0.0
barlow_neighbor_view: true
barlow_neighbor_k: 6
barlow_view_points: ${data.model_points}

# Data augmentation (applied in dataloaders)
augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false

