defaults:
  - data: data_synth_polycrystalline
project_name: pointnet
experiment_name: synth_SPD_${decoder.name}_l${latent_size}_P${data.num_points}_${loss}_${batch_size}
wandb_mode: offline

model_type: spd
latent_size: 72

# Optional: Load pretrained supervised encoder
load_supervised_checkpoint: False  # Set to True to load pretrained weights
supervised_checkpoint_path: None

encoder:
  name: "VN_DGCNN_Refined"
  kwargs:
    latent_size: ${latent_size}
    n_knn: 20
    pooling: "mean"
    feature_dims: [128, 128, 256, 512, 512]
    dropout_rate: 0.0

decoder:
  name: "SnowflakeDeep"
  kwargs:
    num_points: ${data.num_points}
    latent_size: ${latent_size}
    hidden_dim: 512

# decoder: 
#   name: VN_Crystal
#   kwargs:
#     num_points: ${data.num_points}
#     latent_size: ${latent_size}
#     hidden_dims: [1024, 512, 256]
#     correction_mode: 'none'
#     correction_scale: 0.1
#     correction_hidden_dim: 512    


rot_net:
  name: vn_rotation_head
  kwargs:
    hidden: 256
    use_attention: True

rotation_mode: vn_rotation_head

loss: chamfer+sinkhorn
pdist_scale: 0.0  # weight for pdist component
loss_params:
  pdist:
    mode: full  # 'full', 'sampled', or 'local'
    n_samples: 256  # for sampled mode
    k: 16          # for local mode
    normalize: true
    p: 2           # norm type (1=L1, 2=L2)
    squared: false

sinkhorn_blur: 0.01
sinkhorn_blur_schedule:
  enable: true
  start: 0.05
  end: 0.005
  start_epoch: 0
  duration_epochs: ${epochs}
max_samples: 0  # no limit
torch_compile: True

learning_rate: 0.004
batch_size: 16
gradient_clip_val: 0.5

enable_swa: False
swa_epoch_start: 1000 
epochs: 400
gpu: True
devices: [0]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine

decay_rate: 0.0004
kl_latent_loss_scale: 0.00
pdist_loss_scale: 0.00
ortho_scale: 0.01
kabsch_rotation_loss_scale: 0.000
