defaults:
  - data: data_synth_small_crystals
project_name: pointnet
experiment_name: synth_SPD_${decoder.name}_l${latent_size}_P${data.num_points}_${loss}_${batch_size}
wandb_mode: online

model_type: spd
latent_size: 48

# Optional: Load pretrained supervised encoder
load_supervised_checkpoint: False  # Set to True to load pretrained weights
supervised_checkpoint_path: output/supervised_encoder/2025-11-07/19-36-50/supervised_encoder_VN_DGCNN_l36_bs1024_lr0.0060_rotsixd_head_loss_epochloss_epoch=00.ckpt

encoder: 
  name: VN_DGCNN # PnE_VN
  kwargs:
    latent_size: ${latent_size}
    # hidden_dim1: 360
    # hidden_dim2: 720
    # blocks: [2, 2, 2]
    # bottleneck_ratio: 0.5
    
decoder: 
  name: FoldingSphereAttnRes
  kwargs: 
    latent_size: ${latent_size}
    num_points: ${data.num_points}
    dropout_rate: 0.1
    n_shells: 2
    R1: 0.5
    R2: 1.0
    hidden_dim: 400
    R_att: 0.5
    learnable_template: False

rot_net:
  name: Rot6DHead
  kwargs:
    hidden: 256
    use_attention: True

rotation_mode: sixd_head

loss: sinkhorn+chamfer
sinkhorn_blur: 0.1
sinkhorn_blur_schedule:
  enable: true
  start: 0.1
  end: 0.01
  start_epoch: 0
  duration_epochs: ${epochs}
max_samples: 0  # no limit
torch_compile: True

learning_rate: 0.005
batch_size: 1500

enable_swa: False
swa_epoch_start: 1000 
epochs: 16

gpu: True
devices: [0]
ddp_find_unused_parameters: True
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine

decay_rate: 0.0004
kl_latent_loss_scale: 0.02
pdist_loss_scale: 0.00
ortho_scale: 0.01
kabsch_rotation_loss_scale: 0.000

# Curriculum learning settings
curriculum_learning:
  enable: False  # Set to True to enable curriculum learning
  start_fraction: 0.0  # Starting amorphous fraction (0.0 = no amorphous samples)
  end_fraction: 1.0  # Final amorphous fraction (1.0 = all amorphous samples included)
  start_epoch: 3  # Epoch to start increasing amorphous fraction
  end_epoch: 11  # Epoch to reach end_fraction (null = use max_epochs)
