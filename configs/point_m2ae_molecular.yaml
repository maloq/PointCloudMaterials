defaults:
  - data: data_synth_polycrystalline_balanced_geometries
  - _self_

project_name: pointnet
experiment_name: POINT_M2AE_MOLECULAR_G${point_m2ae.num_groups.0}_S${point_m2ae.group_sizes.0}_D${point_m2ae.encoder_dims.2}_N${data.num_points}_M${data.model_points}
wandb_mode: online

model_type: point_m2ae

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

learning_rate: 0.001
decay_rate: 0.002

batch_size: 2048
precision: bf16-mixed
gradient_clip_val: 1.0
accumulate_grad_batches: 1

epochs: 240
max_samples: 0

gpu: true
devices: [0, 1]
# Point-M2AE pretraining keeps some hierarchy branches outside the reconstruction loss;
# DDP must track unused params.
ddp_find_unused_parameters: true
log_every_n_steps: 5
num_workers: 4

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1e-6

enable_swa: false
swa_epoch_start: 1000

warmup_enabled: true
warmup_epochs: 10
warmup_start_factor: 0.1

max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
enable_train_split_svm_test_metric: false

checkpoint_monitor: val/class/acc_kmeans_plusplus_hungarian
checkpoint_mode: max
checkpoint_save_top_k: 3
test_single_device: true

point_m2ae:
  # Point-M2AE architecture (adapted to molecular crop size).
  mask_ratio: 0.8
  group_sizes: [12, 8, 4]
  num_groups: [24, 12, 6]
  encoder_depths: [5, 5, 5]
  encoder_dims: [96, 192, 384]
  local_radius: [0.32, 0.64, 1.28]
  decoder_depths: [1, 1]
  decoder_dims: [384, 192]
  decoder_up_blocks: [1]
  drop_path_rate: 0.1
  num_heads: 6
  deterministic_fps: false
  crop_mode_train: random
  crop_mode_eval: center

data:
  num_points: 128
  model_points: 80
  split_seed: 42
  pre_normalize: true
  normalize: true
