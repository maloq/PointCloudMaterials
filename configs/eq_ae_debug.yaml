defaults:
  - eq_ae_vn_molecular # Inherit from the main config

experiment_name: DEBUG_EQ_AE_SingleClass_BCC_Pristine

# 1. Precision: Use standard float32 instead of bf16
precision: 32-true

# 2. Regularization: Disable weight decay and gradient clipping
decay_rate: 0.0
gradient_clip_val: 0.0

# 3. Auxiliary Losses: Disable Barlow Twins and KL to focus on reconstruction
barlow_enabled: False
kl_latent_loss_scale: 0.0

# 4. Training params
epochs: 50
check_val_every_n_epoch: 1

batch_size: 32 
learning_rate: 0.005 

# 5. Disable BatchNorm
encoder:
  kwargs:
    use_batchnorm: False
decoder:
  kwargs:
    use_batchnorm: False

# 6. Single Class Training
data:
  synthetic:
    classes: ['bcc_iron_pristine']
