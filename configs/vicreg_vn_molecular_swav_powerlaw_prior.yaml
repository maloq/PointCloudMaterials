defaults:
  - vicreg_vn_molecular_swav
  - _self_

experiment_name: VICREG_SWAV_POWERLAW_a${swav_prior_exponent}_l${latent_size}_K${swav_num_prototypes}_N${data.num_points}_M${data.model_points}_${encoder.name}

# Power-law prototype prior for SwAV assignments.
# With K=7 and exponent=0.5, expected prototype masses are roughly:
# [0.249, 0.176, 0.144, 0.125, 0.111, 0.102, 0.094].
swav_prior_type: powerlaw
swav_prior_exponent: 0.5
swav_sinkhorn_iterations: 50

# Keep VICReg's invariance strong, but soften its uniform-volume pressure so
# the explicit non-uniform SwAV prior can shape prototype occupancy.
vicreg_std_coeff: 5.0
vicreg_cov_coeff: 0.1
