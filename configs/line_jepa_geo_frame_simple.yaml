defaults:
  - _self_

project_name: pointnet
experiment_name: LINE_JEPA_GEOFRAME_CONTINUOUS_VICREG_l${latent_size}_L${data.line_atoms}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: line_jepa
latent_size: 64

resume_from_checkpoint: null
init_from_checkpoint: output/2026-07-10/21-12-03-vicreg-geoframe-simple/VICREG_GEOFRAME_SIMPLE_MULTI_l64_N160_M80_GeoFrameTransformer-epoch=49.ckpt
init_from_checkpoint_strict: false
init_from_checkpoint_encoder_only: false
run_post_training_analysis: false
run_test_after_training: true

data:
  kind: line_static
  radius: 7.2
  sample_type: regular
  n_samples: 8000000
  num_points: 160
  model_points: 80
  overlap_fraction: 0.3
  drop_edge_samples: true
  edge_drop_layers: 3
  dr: 0.01
  train_ratio: 0.8
  line_samples_per_file: 100000
  line_atoms: 5
  line_candidate_atoms: 2048
  line_min_separation_radius_factor: 0.0
  line_slot_spacing_radius_factor: 0.5
  line_fixed_slot_max_deviation_radius_factor: 0.35
  # Retry a different random ray instead of accepting a line that violates the
  # fixed-slot tolerance. Exhaustion remains a loud dataset error.
  line_direction_max_retries: 8
  line_seed: 0
  center_neighborhoods: true
  line_selection_method: fixed_slots
  normalize: true
  auto_cutoff:
    enabled: true
    target_points: 160
    quantile: 0.995
    estimation_samples_per_file: 4000
    seed: 42
    safety_factor: 1.02
    boundary_margin: 7.2
  data_sources:
    - data_path: datasets/Al/inherent_configurations_off
      data_files:
        - 166ps.npy
        - 170ps.npy
        - 174ps.npy
        - 175ps.npy
        - 177ps.npy
        - 240ps.npy
    - data_path: datasets/Mg/inherent_configurations
      data_files:
        - 940ps.npy
        - 960ps.npy
        - 980ps.npy
        - 990ps.npy
        - 1000ps.npy
        - 1500ps.npy
    - data_path: datasets/Ta/inherent_configurations
      data_files:
        - 2.7ns.npy
        - 2.8ns.npy
        - 2.9ns.npy
        - 3.0ns.npy
        - 3.60ns.npy
    - data_path: datasets/Zr/inherent_configurations
      data_files:
        - 160ps.npy
        - 200ps.npy
        - 240ps.npy
        - 280ps.npy
        - 310ps.npy
        - 1560ps.npy
    - data_path: datasets/Al50Ni50/inherent_configurations
      data_files:
        - 0.3ns.npy
        - 0.5ns.npy
        - 0.7ns.npy
        - 0.9ns.npy
        - 2ns.npy
        - 5ns.npy

encoder:
  name: GeoFrameTransformer
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    patch_sizes: [12]
    encoder_dims: 128
    trans_dim: 64
    depth: 6
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    mask_predictor_depth: 2
    ema_decay: 0.996
    deterministic_fps: true
    sorting_mode: none
    group_sampling: fps
    center_input: true
    frame_builder: triad
    frame_eps: 1.0e-6
    use_frame_gating: false
    geometry_bias_mode: orientation
    pooling_mode: max_mean
    ray_feature_dim: 32
    use_gradient_checkpointing: false

line_jepa_weight: 1.0
line_jepa_prediction_coeff: 20.0
line_jepa_target_view_sim_coeff: 0.0
line_jepa_sigreg_coeff: 0.0
line_jepa_regularizer_projector_dim: 96
line_jepa_regularizer_projector_hidden_dim: 96
line_jepa_std_coeff: 0.0
line_jepa_cov_coeff: 0.0
line_jepa_std_eps: 0.0001
line_jepa_std_target: 1.0
line_jepa_target_encoder: frozen
line_jepa_target_ema_decay: 0.996
line_jepa_start_epoch: 0
line_jepa_prediction_positions: endpoints
line_jepa_prediction_target: target
line_jepa_prediction_normalization: l2
line_jepa_prediction_loss: cosine
# Continuous-manifold run: no hard-negative contrastive separation.
line_jepa_context_match_coeff: 0.0
line_jepa_context_match_temperature: 0.1
line_jepa_context_match_negative_count: 64
line_jepa_context_match_negative_max_target_cosine: 0.98
line_jepa_directional_feature_mode: encoder
# Masked-token encoder fine-tuning changed the pretrained geometry in the ablation.
line_jepa_masked_token_coeff: 0.0
line_jepa_masked_token_samples: 256
line_jepa_prediction_hard_enabled: false
line_jepa_prediction_hard_top_fraction: 0.35
line_jepa_prediction_hard_weight_low: 1.0
line_jepa_prediction_hard_weight_high: 1.0
line_jepa_shuffle_controls_enabled: true
line_jepa_shuffle_control_seed: 17
line_jepa_semantic_dim: 64
# Preserve the pretrained continuous geometry while VICReg slowly adapts the encoder.
# Balanced discrete prototypes remain disabled.
line_jepa_semantic_anchor_coeff: 5.0
line_jepa_semantic_relation_coeff: 1.0
line_jepa_semantic_relation_samples: 1024
line_jepa_prototype_coeff: 0.0
line_jepa_prototype_counts: [6, 12, 24]
line_jepa_prototype_temperature: 0.1
line_jepa_prototype_sinkhorn_epsilon: 0.1
line_jepa_prototype_sinkhorn_iterations: 20
line_jepa_freeze_encoder: false
line_jepa_freeze_semantic_projector: true
line_jepa_encoder_freeze_epochs: 2
line_jepa_encoder_lr_scale: 0.01
line_jepa_view_jitter_std: 0.01
line_jepa_view_scale_range: 0.02
line_jepa_sigreg_num_slices: 256
line_jepa_sigreg_integration_min: -5.0
line_jepa_sigreg_integration_max: 5.0
line_jepa_sigreg_integration_points: 17
line_jepa_predictor_hidden_dim: 256
line_jepa_predictor_depth: 3
line_jepa_predictor_heads: 8
line_jepa_predictor_mlp_ratio: 4.0
line_jepa_predictor_dropout: 0.0

vicreg_enabled: true
vicreg_weight: 1.0
vicreg_objective: vicreg
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 25.0
vicreg_cov_coeff: 0.5
vicreg_embed_dim: ${latent_size}
vicreg_projector_mode: identity
vicreg_start_epoch: 0
vicreg_jitter_std: 0.01
vicreg_jitter_mode: physical
vicreg_drop_ratio: 0.0
vicreg_neighbor_view: false
vicreg_view_points: ${data.model_points}
vicreg_rotation_mode: none
vicreg_strain_std: 0.0
vicreg_occlusion_mode: none
vicreg_std_eps: 1.0e-04
vicreg_std_target: 1.0
vicreg_radial_enabled: false

learning_rate: 0.001
batch_size: 4800
precision: bf16-mixed
gradient_clip_val: 1.0
accumulate_grad_batches: 1
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 80
max_samples: 0
check_val_every_n_epoch: 2
checkpoint_monitor: clustering/val_silhouette
checkpoint_mode: max
checkpoint_save_top_k: 3
checkpoint_save_last: true

gpu: true
devices: [0]
ddp_find_unused_parameters: false
log_every_n_steps: 10
num_workers: 12
line_prefetch_factor: 4
test_single_device: true

compile_encoder: false
encoder_compile_mode: default
encoder_compile_fullgraph: false
encoder_compile_dynamic: false
scheduler_name: Cosine
scheduler_min_lr: 1.0e-06
warmup_enabled: true
warmup_epochs: 5
warmup_start_factor: 0.1

decay_rate: 0.0003
enable_embedding_metrics: false
enable_svm_accuracy: false
# Silhouette remains useful for genuinely separated manifolds (for example C1 versus
# C6/C7), but it is interpreted together with continuous-coordinate diagnostics.
enable_probe_metrics: true
probe_k: 6
probe_max_samples: 8192
probe_pca_max_components: 64
probe_silhouette_samples: 5000
probe_kmeans_seed_count: 3
probe_kmeans_n_init: 5
probe_seed: 0
probe_best_k_min: 2
probe_best_k_max: 12
cache_train_supervised_metrics: false
max_consecutive_nan_steps: 20
nonfinite_check_stride: 8

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false

num_sanity_val_steps: 0
