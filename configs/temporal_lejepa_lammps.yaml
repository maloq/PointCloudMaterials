defaults:
 - _self_

project_name: pointnet
experiment_name: LEJEPA_4D_l${latent_size}_C${lejepa_context_frames}_V${vicreg_weight}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: temporal_lejepa
latent_size: 256

resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_encoder_only: true
run_post_training_analysis: false
run_test_after_training: true

data:
  kind: temporal_lammps
  dump_file: datasets/dump_first_10.pos
  sequence_length: 4
  frame_stride: 1
  window_stride: 3
  frame_start: 0
  frame_stop: null
  train_ratio: 0.8
  radius: null
  num_points: 160
  model_points: 80
  center_selection_mode: atom_stride
  center_atom_ids: null
  center_atom_stride: 80
  max_center_atoms: null
  center_selection_seed: 0
  center_grid_overlap: null
  center_grid_reference_frame_index: null
  normalize: true
  center_neighborhoods: true
  selection_method: closest
  cache_dir: null
  rebuild_cache: false
  tree_cache_size: 4
  precompute_neighbor_indices: true
  build_lock_timeout_sec: 7200.0
  build_lock_stale_sec: 86400.0
  auto_cutoff:
    enabled: true
    reference_frame_index: 0
    target_points: ${data.num_points}
    quantile: 0.995
    estimation_samples_per_file: 4000
    seed: 42
    safety_factor: 1.02
    boundary_margin: 7.2

encoder:
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 512
    trans_dim: 128
    depth: 8
    predictor_depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: nearest
    center_input: true
    frame_builder: triad
    frame_eps: 1e-6

learning_rate: 0.001
batch_size: 1024
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 4
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 60
max_samples: 0
check_val_every_n_epoch: 4

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: false
log_every_n_steps: 5
num_workers: 6
temporal_prefetch_factor: 2
temporal_train_window_shuffle_block_size: null
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
warmup_enabled: false

decay_rate: 0.0003
enable_embedding_metrics: false
enable_svm_accuracy: false

# LeJEPA uses the temporal window, while VICReg regularizes the predicted
# last frame with purely spatial views (no adjacent-frame temporal mixing).
temporal_vicreg_use_adjacent_views: false
temporal_vicreg_anchor_frame: last
vicreg_enabled: true
vicreg_weight: 0.8
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 15.0
vicreg_cov_coeff: 1.0
vicreg_embed_dim: 256
vicreg_start_epoch: 0
vicreg_jitter_std: 0.01
vicreg_jitter_mode: physical
vicreg_drop_ratio: 0.0
vicreg_neighbor_view: true
vicreg_neighbor_view_mode: second
vicreg_neighbor_k: 8
vicreg_neighbor_max_relative_distance: 0.0
vicreg_view_points: ${data.model_points}
vicreg_std_eps: 1e-4
vicreg_std_target: 1.0
vicreg_radial_enabled: false

lejepa_enabled: true
lejepa_weight: 1.0
lejepa_lambda: 0.05
lejepa_start_epoch: 0
lejepa_context_frames: 3
lejepa_num_slices: 512
lejepa_integration_min: -5.0
lejepa_integration_max: 5.0
lejepa_integration_points: 17

augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false
