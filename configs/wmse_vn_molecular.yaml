defaults:
# - data: data_synth_polycrystalline_balanced_geometries_v2
# - data: data_ae_multi_material
- data: data_synth_polycrystalline_balanced_geometries

data:

project_name: pointnet
experiment_name: WMSE_l${latent_size}_N${data.num_points}_M${data.model_points}_${encoder.name}
wandb_mode: online

model_type: wmse  # Self-supervised W-MSE
latent_size: 512  # For RI_MAE_Invariant this must equal 2 * trans_dim.

load_supervised_checkpoint: false
resume_from_checkpoint: null

# Any registered encoder can be used here (e.g. RI_MAE_Invariant, VN_REVNET_Atomic,
# VN_REVNET_Backbone, PnE_VN, VN_DGCNN, DGCNN, EGNN_Encoder, PnE_L, PnE_S, MLP).
encoder:
  name: RI_MAE_Invariant
  kwargs:
    latent_size: ${latent_size}
    num_group: 24
    group_size: 12
    encoder_dims: 512
    trans_dim: 256
    depth: 8
    predictor_depth: 4
    num_heads: 16
    mlp_ratio: 4.0
    dropout: 0.0
    mask_ratio: 0.6
    ema_decay: 0.996
    deterministic_fps: false
    sorting_mode: nearest
    center_input: true


# Decoder config is required by the model factory but is not used for W-MSE
decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}

# Training parameters
learning_rate: 0.003
batch_size: 4096
precision: bf16-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1
auto_batch_size_search: false
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 60
max_samples: 0
check_val_every_n_epoch: 5

gpu: true
devices: [0, 1]
ddp_find_unused_parameters: true
log_every_n_steps: 5
num_workers: 4
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
warmup_enabled: true
warmup_epochs: 12
warmup_start_factor: 0.1

decay_rate: 0.0004
contrastive_norms_only_latent: true
enable_embedding_metrics: false
enable_svm_accuracy: false

# IDEC clustering (disabled by default; enable after pretraining)
idec_enabled: false
idec_num_clusters: 0
idec_gamma: 0.1
idec_update_interval: 200
idec_delta: 0.001
idec_max_iter: null
idec_use_global_p: true
idec_normalize_z: true
idec_init_kmeans: true

# Barlow Twins / VICReg / PointContrast (disabled)
barlow_enabled: false
barlow_weight: 0.0
vicreg_enabled: false
vicreg_weight: 0.0
pointcontrast_enabled: false
pointcontrast_weight: 0.0

# W-MSE (self-supervised)
wmse_enabled: true
wmse_weight: 1.0
wmse_embed_dim: 120
wmse_start_epoch: 0
wmse_jitter_std: 0.01
wmse_jitter_mode: physical
wmse_drop_ratio: 0.0
wmse_neighbor_view: true
wmse_neighbor_view_mode: second
wmse_neighbor_k: 6
wmse_view_points: ${data.model_points}
wmse_rotation_mode: none
wmse_rotation_deg: 10.0
wmse_strain_std: 0.02
wmse_strain_volume_preserve: true
wmse_occlusion_mode: mixed
wmse_occlusion_view: second
wmse_occlusion_slab_frac: 0.0
wmse_occlusion_cone_deg: 0.0
wmse_invariant_mode: passthrough
wmse_invariant_max_factor: 4.0
wmse_invariant_groups: 0
wmse_invariant_use_third_order: true
wmse_invariant_eps: 1e-6
wmse_whitening_eps: 1e-4
wmse_whitening_iters: 1
wmse_whitening_size: 256
wmse_normalize_embeddings: true


# Pose regression (symmetry-aware)
pose:
  enabled: false
  weight: 0.4
  start_epoch: 10
  head_hidden: 256
  jitter_std: 0.000
  strain_std: 0.000
  strain_volume_preserve: true
  seeded_forward: true
  view_rotation_mode: full
  view_rotation_deg: 0.0
  unambiguous_rotation: true
  unambiguous_margin_deg: 1.0
  curriculum_enabled: true
  curriculum_epochs: 120
  curriculum_start_deg: 8.0
  eq_center: true
  eq_l2_normalize: true
  cov_normalize: true
  head_loss_weight: 1.0
  procrustes_loss_weight: 0.35
  histogram_every_n_steps: 50
  ambiguity_use_std: true
  ambiguity_floor: 0.001

# Data augmentation (applied in dataloaders)
augmentation:
  rotation_scale: 0.0
  noise_scale: 0.0
  jitter_scale: 0.0
  scaling_range: 0.0
  track_augmentation: false

