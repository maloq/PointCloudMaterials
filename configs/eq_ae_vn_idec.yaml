defaults:
  - eq_ae_vn
  - _self_

experiment_name: EQ_AE_IDEC_l${latent_size}_P${data.num_points}_${loss}_${decoder.name}

# Load pretrained autoencoder weights before IDEC finetuning
load_pretrained_ae: True
pretrained_ae_checkpoint: output/2026-01-25/19-18-27/EQ_AE_l128_P512_chamfer_VN_REVNET_Anchor-epoch=539.ckpt

# Enable IDEC clustering
idec_enabled: True
# Set to the number of clusters for your dataset
idec_num_clusters: 4
idec_gamma: 0.1
idec_update_interval: 200
idec_use_global_p: True

learning_rate: 0.0005
batch_size: 256
epochs: 30