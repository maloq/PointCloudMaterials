defaults:
  - vicreg_vn_molecular
  - override /data: data_ae_multi_material
  - _self_

experiment_name: VISREG_l${latent_size}_K${visreg_num_projections}_N${data.num_points}_M${data.model_points}_${encoder.name}

model_type: visreg
init_from_checkpoint: output/2026-06-16/18-46-58/VICREG_l512_N160_M80_RI_MAE_Invariant-epoch=789.ckpt
resume_from_checkpoint: null

# Make the VISReg comparison use the same multi-material static setup as the
# current VICReg molecular config. 300 epochs gives a checkpoint comparable to
# the VICReg epoch-279 analysis, while keeping the run shorter than the base
# 800-epoch config.
epochs: 300

# VISReg reuses the existing contrastive view sampler/projector path, but
# switches the objective from VICReg covariance regularization to the paper's
# center + scale + sliced-Wasserstein shape regularization.
vicreg_enabled: true
vicreg_weight: 1.0
vicreg_objective: visreg

# VISReg full loss in the current implementation:
#   (1 - visreg_lambda) * prediction + visreg_lambda * regularization
# The regularization is scale + shape + center with separate ablation weights.
# Lower lambda strengthens paired-view agreement. The old value 0.9 made the
# loss mostly distribution matching, which produced less meaningful clusters.
visreg_lambda: 0.4
visreg_num_projections: 4096
visreg_scale_coeff: 1.0
visreg_shape_coeff: 0.5
visreg_center_coeff: 0.1
visreg_std_eps: 1e-6
