defaults:
  - data: synth_modelnet_objects
  - _self_

project_name: pointnet
experiment_name: VICREG_MODELNET40_pointnet
wandb_mode: online

model_type: vicreg
latent_size: 96

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

encoder:
  name: PnE_L
  kwargs:
    latent_size: ${latent_size}

# Required by model factory; not used by contrastive objective directly.
decoder:
  name: VN_REVNET_Anchor
  kwargs:
    num_points: ${data.model_points}
    latent_size: ${latent_size}

learning_rate: 0.0015
decay_rate: 0.0001

batch_size: 128
precision: 32-true
gradient_clip_val: 1.0
accumulate_grad_batches: 10
auto_batch_size_search: true
auto_batch_size_mode: power
auto_batch_size_init_val: null
auto_batch_size_max_trials: 12
auto_batch_size_steps_per_trial: 3
auto_batch_size_use_single_device: true
auto_batch_size_adjust_accumulate: true
auto_batch_size_target_effective_batch: null
auto_batch_size_strict: false

enable_swa: false
swa_epoch_start: 1000
epochs: 120
max_samples: 0

gpu: true
devices: [0]
ddp_find_unused_parameters: true
log_every_n_steps: 5
num_workers: 6
scheduler_gamma: 0.5
scheduler_name: Cosine
scheduler_min_lr: 1e-6
warmup_enabled: true
warmup_epochs: 12
warmup_start_factor: 0.1

max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
enable_embedding_metrics: false
disable_dataset_augmentation_for_ssl: true

test_cluster_eval_k: 40
enable_test_so3_metrics: true
test_so3_rotation_runs: 5
test_so3_rotation_seed: 12345

idec_enabled: false
idec_num_clusters: 0
idec_gamma: 0.1
idec_update_interval: 200
idec_delta: 0.001
idec_max_iter: null
idec_use_global_p: true
idec_normalize_z: true
idec_init_kmeans: true

barlow_enabled: false

pose_enabled: false
pose_weight: 0.0
pose:
  enabled: false
  weight: 0.0

symmetry:
  type: none
  beta: 30.0
  angle_eps: 1e-6

vicreg_enabled: true
contrastive_norms_only_latent: false
vicreg_weight: 1.0
vicreg_sim_coeff: 25.0
vicreg_std_coeff: 25.0
vicreg_cov_coeff: 1.0
vicreg_embed_dim: 512
vicreg_start_epoch: 0
vicreg_jitter_std: 0.02
vicreg_jitter_mode: absolute
vicreg_drop_ratio: 0.12
vicreg_drop_apply_to_both: true
vicreg_neighbor_view: true
vicreg_neighbor_view_mode: both
vicreg_neighbor_k: 8
vicreg_neighbor_max_relative_distance: 0.1
vicreg_view_points: ${data.model_points}
vicreg_view_crop_mode: random
vicreg_rotation_mode: none
vicreg_rotation_deg: 0.0
vicreg_strain_std: 0.04
vicreg_strain_volume_preserve: true
vicreg_occlusion_mode: mixed
vicreg_occlusion_view: both
vicreg_occlusion_slab_frac: 0.2
vicreg_occlusion_cone_deg: 25.0
vicreg_std_eps: 1e-4
vicreg_std_target: 1.0
vicreg_radial_enabled: true
vicreg_radial_beta1: 1.0
vicreg_radial_beta2: 0.1
vicreg_radial_m: null
vicreg_radial_eps: 1e-8
vicreg_invariant_mode: tensor_product
vicreg_invariant_max_factor: 4.0
vicreg_invariant_groups: 0
vicreg_invariant_use_third_order: true
vicreg_invariant_eps: 1e-6

analysis_cluster_method: auto
analysis_cluster_l2_normalize: true
analysis_cluster_standardize: true
analysis_cluster_pca_var: 0.98
analysis_cluster_pca_max_components: 32
analysis_cluster_k_values: [40]
analysis_progress_every_batches: 20
analysis_max_samples_total: 0
analysis_tsne_max_samples: 8000
analysis_tsne_n_iter: 1000
analysis_interactive_max_points: 0
analysis_md_use_all_points: true
analysis_hdbscan_enabled: false
analysis_hdbscan_fit_fraction: 0.25
analysis_hdbscan_max_fit_samples: 50000
analysis_hdbscan_target_k_min: 35
analysis_hdbscan_target_k_max: 45
analysis_hdbscan_min_cluster_size_candidates: []
analysis_hdbscan_min_samples: null
analysis_hdbscan_cluster_selection_epsilon: 0.0
analysis_hdbscan_cluster_selection_method: leaf
analysis_grain_enabled: false
analysis_num_workers: 0
