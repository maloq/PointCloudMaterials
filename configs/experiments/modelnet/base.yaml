# Base configuration for ModelNet40 experiments
batch_size: 16
num_workers: 4
max_epochs: 50
latent_size: 420
ortho_scale: 0.0
kl_latent_loss_scale: 0.0
learning_rate: 0.002
decay_rate: 0.00001
scheduler_name: "Cosine"
scheduler_gamma: 0.5
enable_swa: False
swa_epoch_start: 50
epochs: ${max_epochs}
rotation_mode: "vn_rotation_head"
load_supervised_checkpoint: False
loss: "chamfer"
loss_params:
  chamfer:
    point_reduction: "mean" # "mean" or "sum"
    squared: True
    auto_scale_by_points: False # Scale loss by 1/num_points
max_supervised_samples: 4096
max_test_samples: 1000
enable_expensive_metrics: True

augmentation:
  noise_scale: 0.02  
  rotation_scale: 1.0
  jitter_scale: 0.05
  scaling_range: 0.15

data:
  data_path: "datasets/ModelNet40"
  metadata_file: "datasets/metadata_modelnet40.csv"
  num_points: 1024
  sampling_method: "fps"

encoder:
  name: "VN_DGCNN_Refined"
  kwargs:
    latent_size: ${latent_size}
    n_knn: 20
    pooling: "mean"
    feature_dims: [128, 128, 256, 256, 512]
    dropout_rate: 0.1

# encoder: 
#   name: PnE_VN
#   kwargs:
#     latent_size: ${latent_size}
#     pooling: "max"
#     hidden_dim1: 512
#     hidden_dim2: 1024
#     stn_hidden_dims: [128, 256, 1024]
#     stn_fc_dims: [512, 256]
#     std_feature_hidden_dims: [256, 128]
#     use_batchnorm: True

decoder:
  name: "SnowflakeDeep"
  kwargs:
    num_points: ${data.num_points}
    latent_size: ${latent_size}
    hidden_dim: 512

rot_net:
  name: "vn_rotation_head"
  kwargs:
    hidden: 128

sinkhorn_blur_schedule:
  enable: True
  start: 0.02
  end: 0.001
  start_epoch: 0
  duration_epochs: 200
