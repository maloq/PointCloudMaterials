# Run the molecular VICReg setup with VN_REVNET_Backbone,
# while keeping the VICReg molecular config as the base.
#
# Usage:
#   python scripts/run_experiments.py --plan configs/experiments/ssl_objectives_vn_revnet_molecular.yaml
#   python scripts/run_experiments.py --plan configs/experiments/ssl_objectives_vn_revnet_molecular.yaml --dry-run

name: vicreg_vn_revnet_molecular
train_script: src/training_methods/contrastive_learning/train_contrastive.py
config_name: vicreg_vn_molecular.yaml

slurm:
  partition: L40S
  gpus: 1
  cpus: 8
  mem: 80G
  time: "24:00:00"

base_overrides:
  - "encoder.name=VN_REVNET_Backbone"
  - "latent_size=80"
  - "encoder.kwargs=null"
  - "+encoder.kwargs={latent_size:80,sa_npoints:[80,40],sa_channels:[128,256],attn_hidden:256}"
  - "load_supervised_checkpoint=false"
  - "init_from_checkpoint=null"
  - "resume_from_checkpoint=null"
  - "devices=[0]"
  - "batch_size=128"
  - "accumulate_grad_batches=8"
  - "auto_batch_size_search=true"
  - "auto_batch_size_adjust_accumulate=true"
  - "auto_batch_size_target_effective_batch=1024"
  - "auto_batch_size_init_val=128"
  - "vicreg_enabled=false"
  - "vicreg_weight=0.0"
  - "++run_post_training_analysis=false"
  - "++checkpoint_monitor=val/class/acc_kmeans_plusplus_hungarian"
  - "++checkpoint_mode=max"

experiments:
  - name: vicreg
    overrides:
      - "model_type=vicreg"
      - "vicreg_enabled=true"
      - "vicreg_weight=1.0"

metrics:
  final:
    - test/loss
    - test/class/acc_kmeans_plusplus_hungarian
    - test/class/nmi
    - test/class/ari

  best:
    - name: val/class/acc_kmeans_plusplus_hungarian
      mode: max
    - name: val/class/nmi
      mode: max
    - name: val/class/ari
      mode: max
    - name: val/loss
      mode: min

output_root: output/experiments
