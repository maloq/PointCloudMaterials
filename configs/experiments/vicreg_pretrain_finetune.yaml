# Two-stage pipeline: pretrain on ModelNet40, then finetune on ModelNet10 balanced.
# Replaces: scripts/train_specific_models.py
#
# Usage:
#   python scripts/run_experiments.py --plan experiments/vicreg_pretrain_finetune.yaml
#   python scripts/run_experiments.py --plan experiments/vicreg_pretrain_finetune.yaml --local

name: vicreg_pretrain_finetune
train_script: src/training_methods/contrastive_learning/train_contrastive.py

slurm:
  partition: L40S
  gpus: 1
  cpus: 8
  mem: 120G
  time: "24:00:00"

stages:
  - name: pretrain
    config_name: vicreg_vn_modelnet40.yaml
    base_overrides:
      - latent_size=96
      - auto_batch_size_search=false
      - auto_batch_size_adjust_accumulate=false
      - batch_size=32
      - accumulate_grad_batches=40
      - "+run_post_training_analysis=False"
      - "+num_sanity_val_steps=0"
      - "devices=[0]"
    experiments:
      - name: pointnet
        overrides: ["encoder.name=PnE_L"]
      - name: vn_pointnet
        overrides: ["encoder.name=PnE_VN"]
      - name: dgcnn
        overrides: ["encoder.name=DGCNN"]
      - name: vn_dgcnn
        overrides: ["encoder.name=VN_DGCNN"]

  - name: finetune
    config_name: vicreg_vn_modelnet40_balanced_top10.yaml
    depends_on: pretrain
    inherit_checkpoint: true
    base_overrides:
      - latent_size=96
      - auto_batch_size_search=false
      - auto_batch_size_adjust_accumulate=false
      - batch_size=32
      - accumulate_grad_batches=40
      - "+run_post_training_analysis=False"
      - "+num_sanity_val_steps=0"
      - "devices=[0]"
    experiments:
      - name: pointnet
        overrides: ["encoder.name=PnE_L"]
      - name: vn_pointnet
        overrides: ["encoder.name=PnE_VN"]
      - name: dgcnn
        overrides: ["encoder.name=DGCNN"]
      - name: vn_dgcnn
        overrides: ["encoder.name=VN_DGCNN"]

metrics:
  final:
    - val/loss
    - val/class/encoder_linear_svm_accuracy
  best:
    - name: val/class/encoder_linear_svm_accuracy
      mode: max

output_root: output/experiments
