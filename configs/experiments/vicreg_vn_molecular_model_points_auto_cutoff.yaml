# Model-point sweep for VICReg using `vicreg_vn_molecular.yaml` and keeping its
# synthetic polycrystalline dataset.
#
# The synthetic loader now supports per-environment auto cutoff estimation from
# `atoms.npy`, so this sweep can stay on the same dataset family as the default
# config while still adapting the radius to each requested point budget.
#
# For each run:
#   - data.model_points is set to the requested encoder/view point count
#   - data.num_points is set to 2 * data.model_points
#   - data.auto_cutoff.target_points matches data.num_points
#
# Usage:
#   python scripts/run_experiments.py --plan configs/experiments/vicreg_vn_molecular_model_points_auto_cutoff.yaml
#   python scripts/run_experiments.py --plan configs/experiments/vicreg_vn_molecular_model_points_auto_cutoff.yaml --local

name: vicreg_vn_molecular_model_points_auto_cutoff
train_script: src/training_methods/contrastive_learning/train_contrastive.py
config_name: vicreg_vn_molecular.yaml
repeat_each: 5

slurm:
  partition: L40S
  gpus: 1
  cpus: 8
  mem: 120G
  time: "24:00:00"

base_overrides:
  - "devices=[0]"
  - "load_supervised_checkpoint=false"
  - "init_from_checkpoint=null"
  - "data.auto_cutoff.enabled=true"
  - "++run_post_training_analysis=false"
  - "++checkpoint_monitor=val/class/acc_kmeans_plusplus_hungarian"
  - "++checkpoint_mode=max"

experiments:
  - name: mp_024_np_048
    overrides:
      - "data.model_points=24"
      - "data.num_points=48"
      - "data.auto_cutoff.target_points=48"

  - name: mp_030_np_060
    overrides:
      - "data.model_points=30"
      - "data.num_points=60"
      - "data.auto_cutoff.target_points=60"

  - name: mp_040_np_080
    overrides:
      - "data.model_points=40"
      - "data.num_points=80"
      - "data.auto_cutoff.target_points=80"

  - name: mp_060_np_120
    overrides:
      - "data.model_points=60"
      - "data.num_points=120"
      - "data.auto_cutoff.target_points=120"

  - name: mp_080_np_160
    overrides:
      - "data.model_points=80"
      - "data.num_points=160"
      - "data.auto_cutoff.target_points=160"

  - name: mp_120_np_240
    overrides:
      - "data.model_points=120"
      - "data.num_points=240"
      - "data.auto_cutoff.target_points=240"

  - name: mp_160_np_320
    overrides:
      - "data.model_points=160"
      - "data.num_points=320"
      - "data.auto_cutoff.target_points=320"

metrics:
  final:
    - test/loss
    - test/class/acc_kmeans_plusplus_hungarian
    - test/class/nmi
    - test/class/ari

  best:
    - name: val/class/acc_kmeans_plusplus_hungarian
      mode: max
    - name: val/class/nmi
      mode: max
    - name: val/class/ari
      mode: max
    - name: val/loss
      mode: min

plot:
  enabled: true
  x_label: "Model points"
  x_pattern: "mp_(\\d+)"
  metric_scope: "test/class"
  metrics:
    - acc_kmeans_plusplus_hungarian
    - nmi
    - ari
  formats: ["png", "pdf", "svg"]
  dpi: 300
  individual_panels: true

output_root: output/experiments
