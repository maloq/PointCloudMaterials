defaults:
  - data: synth_modelnet_objects
  - _self_

project_name: pointnet
experiment_name: POINT_M2AE_MODELNET40_G${point_m2ae.num_groups.0}_S${point_m2ae.group_sizes.0}_D${point_m2ae.encoder_dims.2}
wandb_mode: online

model_type: point_m2ae

load_supervised_checkpoint: false
resume_from_checkpoint: null
init_from_checkpoint: null
init_from_checkpoint_strict: false

learning_rate: 0.001
decay_rate: 0.05

batch_size: 96
precision: 32-true
gradient_clip_val: 1.0
accumulate_grad_batches: 1

epochs: 300
max_samples: 0

gpu: true
devices: [0, 1]
# Point-M2AE pretraining keeps some hierarchy branches outside the reconstruction loss;
# DDP must track unused params.
ddp_find_unused_parameters: true
log_every_n_steps: 10
num_workers: 4

scheduler_name: Cosine
scheduler_gamma: 0.5
scheduler_min_lr: 1e-6

enable_swa: false
swa_epoch_start: 1000

warmup_enabled: true
warmup_epochs: 10
warmup_start_factor: 0.1

max_supervised_samples: 12000
max_test_samples: 12000
cache_train_supervised_metrics: false
enable_train_split_svm_test_metric: true
train_split_svm_max_samples: 12000
train_split_svm_c: 0.018
val_cluster_acc_methods: [kmeans, kmeans++]
val_cluster_acc_runs: 1
test_cluster_acc_methods: [kmeans, kmeans++]
test_cluster_acc_runs: 1
test_cluster_acc_runs_by_method:
  kmeans: 20

checkpoint_monitor: val/class/encoder_linear_svm_accuracy
checkpoint_mode: max
checkpoint_save_top_k: 3
test_single_device: true

point_m2ae:
  # Official Point-M2AE defaults from the original pre-training config.
  mask_ratio: 0.8
  group_sizes: [16, 8, 8]
  num_groups: [512, 256, 64]
  encoder_depths: [5, 5, 5]
  encoder_dims: [96, 192, 384]
  local_radius: [0.32, 0.64, 1.28]
  decoder_depths: [1, 1]
  decoder_dims: [384, 192]
  decoder_up_blocks: [1]
  drop_path_rate: 0.1
  num_heads: 6
  deterministic_fps: false
  crop_mode_train: random
  crop_mode_eval: center

data:
  modelnet_split: train
  modelnet_eval_split: test
  train_ratio: 0.9
  num_points: 1024
  model_points: 1024
  add_center_point: false
  pre_normalize: true
  normalize: true
  augmentation:
    rotation_scale: 0.0
    noise_scale: 0.0
    jitter_scale: 0.0
    scaling_range: 0.2
    track_augmentation: false
