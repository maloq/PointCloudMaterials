# Parallel encoder comparison on ModelNet40 with VICReg.
# Replaces: scripts/submit_modelnet40_vicreg_parallel.sh
#
# Usage:
#   python scripts/run_experiments.py --plan experiments/vicreg_encoders.yaml
#   python scripts/run_experiments.py --plan experiments/vicreg_encoders.yaml --dry-run

name: vicreg_encoders
train_script: src/training_methods/contrastive_learning/train_contrastive.py
config_name: vicreg_vn_modelnet40.yaml

slurm:
  partition: L40S
  gpus: 1
  cpus: 8
  mem: 120G
  time: "24:00:00"

base_overrides:
  - latent_size=96
  - auto_batch_size_search=true
  - auto_batch_size_adjust_accumulate=false
  - batch_size=64
  - accumulate_grad_batches=8
  - analysis_hdbscan_enabled=false
  - "devices=[0]"
  - "test_so3_rotation_runs=5"

experiments:
  - name: pointnet
    overrides: ["encoder.name=PnE_L"]
  - name: vn_pointnet
    overrides: ["encoder.name=PnE_VN"]
  - name: dgcnn
    overrides: ["encoder.name=DGCNN"]
  - name: vn_dgcnn
    overrides: ["encoder.name=VN_DGCNN"]
  - name: vn_revnet
    overrides: ["encoder.name=VN_REVNET_Backbone"]
  - name: egnn
    overrides: ["encoder.name=EGNN_Encoder"]
metrics:
  final:
    - val/loss
    - val/class/encoder_linear_svm_accuracy
    - test/class/acc_kmeans_plusplus_hungarian
    - test/class/nmi
    - test/class/ari
    - test/class/acc_kmeans_plusplus_hungarian_rotated
    - test/class/nmi_rotated
    - test/class/ari_rotated
    - test/class/ari_rotated_std
    - test/class/nmi_rotated_std



  best:
    - name: val/class/encoder_linear_svm_accuracy
      mode: max
    - name: val/loss
      mode: min
    - name: val/class/nmi
      mode: max
    - name: val/class/ari
      mode: max

output_root: output/experiments
