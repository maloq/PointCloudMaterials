# Single-variable ablation: sweep learning rate for SPD training.
# Replaces: scripts/run_ablation.py with an ablation YAML config.
#
# Usage:
#   python scripts/run_experiments.py --plan experiments/lr_ablation.yaml
#   python scripts/run_experiments.py --plan experiments/lr_ablation.yaml --local

name: lr_ablation
train_script: src/training_methods/spd/train_spd.py
config_name: spd_config.yaml

slurm:
  partition: L40S
  gpus: 1
  cpus: 8
  mem: 120G
  time: "12:00:00"

base_overrides:
  - "devices=[0]"

matrix:
  learning_rate: [0.0001, 0.0005, 0.001, 0.005]

metrics:
  final:
    - val/loss
    - val/chamfer
  best:
    - name: val/loss
      mode: min

output_root: output/ablations
