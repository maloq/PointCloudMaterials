<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="820" viewBox="0 0 1300 820">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #374151; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .box-text { font: 13px Arial, sans-serif; fill: #374151; }
      .small { font: 12px Arial, sans-serif; fill: #4b5563; }
      .code { font: 13px "Courier New", monospace; fill: #111827; }
    </style>
  </defs>

  <rect width="1300" height="820" fill="#ffffff"/>
  <text x="60" y="56" class="title">Current Line-JEPA Training Flow</text>
  <text x="60" y="84" class="subtitle">Pure Line-JEPA with all-mask online residual targets, anchor-local SwAV, std/cov regularization, and SIGReg off.</text>

  <rect x="60" y="125" width="250" height="132" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="82" y="154" class="box-title">Input line batch</text>
  <text x="82" y="179" class="box-text">3 line local structures per sample</text>
  <text x="82" y="200" class="box-text">all masks: target can be left, middle, or right</text>
  <text x="82" y="221" class="box-text">plus 2 anchor-local SwAV views</text>
  <text x="82" y="242" class="small">Al only, 160 points per view</text>

  <rect x="390" y="112" width="250" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="412" y="141" class="box-title">Online encoder</text>
  <text x="412" y="166" class="box-text">encodes all line views once</text>
  <text x="412" y="187" class="box-text">also encodes augmented anchor views</text>

  <rect x="390" y="258" width="250" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="412" y="287" class="box-title">Online target branch</text>
  <text x="412" y="312" class="box-text">same online encoder supplies each target</text>
  <text x="412" y="333" class="box-text">target is detached inside prediction loss</text>

  <line x1="310" y1="169" x2="390" y2="160" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="310" y1="213" x2="390" y2="306" stroke="#15803d" stroke-width="3" marker-end="url(#arrow-green)"/>

  <rect x="730" y="112" width="260" height="112" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="752" y="141" class="box-title">Small context predictor</text>
  <text x="752" y="166" class="box-text">hidden dim 32, depth 1, heads 4</text>
  <text x="752" y="187" class="box-text">input: two context features + relative positions</text>
  <text x="752" y="208" class="box-text">runs for all 3 target positions</text>

  <line x1="640" y1="160" x2="730" y2="160" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="730" y="274" width="262" height="118" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="752" y="303" class="box-title">Residual target</text>
  <text x="752" y="328" class="code">target_residual =</text>
  <text x="752" y="349" class="code">z_target_online</text>
  <text x="752" y="370" class="code">- stopgrad(mean(z_context_online))</text>

  <line x1="640" y1="306" x2="730" y2="319" stroke="#15803d" stroke-width="3" marker-end="url(#arrow-green)"/>
  <path d="M640,184 C690,196 692,284 730,333" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="1050" y="164" width="200" height="112" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="1072" y="193" class="box-title">Prediction loss</text>
  <text x="1072" y="218" class="box-text">Weighted SmoothL1</text>
  <text x="1072" y="239" class="box-text">top 35% residual novelty is upweighted</text>
  <text x="1072" y="260" class="small">coefficient: 1.0</text>

  <line x1="990" y1="183" x2="1050" y2="208" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="992" y1="333" x2="1050" y2="238" stroke="#15803d" stroke-width="3" marker-end="url(#arrow-green)"/>

  <rect x="60" y="430" width="268" height="120" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="82" y="459" class="box-title">Anchor-local views</text>
  <text x="82" y="484" class="box-text">2 online views inside anchor structure</text>
  <text x="82" y="505" class="box-text">0 &lt; distance &lt; 1.0R</text>
  <text x="82" y="526" class="box-text">closest selection, jitter 0.01, scale +/-0.02</text>

  <rect x="390" y="430" width="250" height="120" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="412" y="459" class="box-title">Anchor-local SwAV</text>
  <text x="412" y="484" class="box-text">swapped prototype assignment</text>
  <text x="412" y="505" class="box-text">32 prototypes, Sinkhorn assignments</text>
  <text x="412" y="526" class="small">swav_weight: 1.0</text>

  <line x1="328" y1="490" x2="390" y2="490" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)"/>

  <rect x="730" y="472" width="260" height="136" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="752" y="501" class="box-title">Regularizer projector</text>
  <text x="752" y="526" class="box-text">applied to online embeddings only:</text>
  <text x="752" y="547" class="box-text">line views and anchor-local views</text>
  <text x="752" y="568" class="code">512 -> 96 -> 96 -> 96</text>
  <text x="752" y="589" class="small">67,968 trainable params</text>

  <path d="M520,208 C530,330 610,414 730,520" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M640,490 C675,490 700,500 730,520" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="1050" y="472" width="200" height="136" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1072" y="501" class="box-title">Std/cov regularizer</text>
  <text x="1072" y="526" class="box-text">VICReg-style variance</text>
  <text x="1072" y="547" class="box-text">and covariance penalties</text>
  <text x="1072" y="568" class="small">std coeff: 5.0</text>
  <text x="1072" y="589" class="small">cov coeff: 0.1</text>

  <line x1="990" y1="540" x2="1050" y2="540" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="60" y="650" width="1190" height="88" rx="8" fill="#f8fafc" stroke="#d1d5db"/>
  <text x="82" y="680" class="box-title">Total training objective</text>
  <text x="82" y="705" class="box-text">loss = hard_weighted_prediction + swav + 5.0 * std_loss + 0.1 * cov_loss</text>
  <text x="82" y="728" class="box-text">SIGReg is disabled in this config: line_jepa_sigreg_coeff = 0.0</text>

  <path d="M1150,276 C1148,405 1148,590 1130,650" fill="none" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M515,550 C530,615 680,638 760,650" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <path d="M1150,608 C1148,625 1145,640 1140,650" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
